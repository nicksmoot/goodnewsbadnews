document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

ollable nav */\n    header nav{ flex-wrap:nowrap !important; overflow-x:auto; width:100%; gap:2px !important; -webkit-overflow-scrolling:touch; scrollbar-width:none; }\n    header nav::-webkit-scrollbar{ display:none; }\n    header nav a{ flex:0 0 auto; white-space:nowrap; }\n    /* trim oversized hero / section top padding */\n    section[style*=\"padding:64px 24px\"]{ padding-top:40px !important; }\n    section[style*=\"padding:56px 24px\"]{ padding-top:34px !important; }\n    section[style*=\"padding:52px 24px\"]{ padding-top:32px !important; }\n    section[style*=\"padding:50px 24px\"]{ padding-top:30px !important; }\n    /* the map needs less height on small screens */\n    #gnbn-map{ height:420px !important; }\n  }\n  @media (max-width:560px){\n    /* big dark panels: tighter padding + radius */\n    [style*=\"padding:46px;\"]{ padding:26px !important; }\n    [style*=\"padding:42px;\"]{ padding:24px !important; }\n    [style*=\"border-radius:24px\"]{ border-radius:18px !important; }\n    /* full-width CTA buttons so they don't crowd */\n    section[style*=\"padding:64px 24px\"] a[href=\"#/submit\"],\n    section[style*=\"padding:64px 24px\"] a[href=\"#/latest\"]{ flex:1 1 100%; text-align:center; }\n  }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"min-height:100vh;display:flex;flex-direction:column\">\n\n<header style=\"position:sticky;top:0;z-index:50;background:rgba(248,242,231,0.92);backdrop-filter:blur(10px);border-bottom:1px solid #d8cab2\">\n  <div style=\"max-width:1240px;margin:0 auto;padding:13px 24px;display:flex;justify-content:space-between;align-items:center;gap:20px;flex-wrap:wrap\">\n    <div style=\"display:flex;align-items:center;gap:11px;flex-shrink:0\">\n      <a href=\"#/\" style=\"display:flex;align-items:baseline;gap:9px;text-decoration:none\">\n        <span style=\"font-family:'Spectral',serif;font-weight:800;font-size:25px;letter-spacing:-0.6px;line-height:1\"><span style=\"color:#19734a\">Good News<\u002Fspan> <span style=\"color:#a33429\">Bad News<\u002Fspan><\u002Fspan>\n      <\u002Fa>\n      <span style=\"font-family:'IBM Plex Mono',monospace;font-size:9px;font-weight:600;letter-spacing:1.4px;color:#8a857a;text-transform:uppercase\">in<\u002Fspan>\n      <select value=\"{{ city }}\" onchange=\"{{ onCity }}\" style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;font-weight:600;letter-spacing:1px;color:#9a6a12;text-transform:uppercase;border:1px solid #c99a2e80;border-radius:6px;padding:5px 8px;background:#fffaf1;cursor:pointer\">\n        <option value=\"spokane\">Spokane, WA<\u002Foption>\n        <option value=\"honolulu\">Honolulu, HI<\u002Foption>\n      <\u002Fselect>\n    <\u002Fdiv>\n    <nav style=\"display:flex;gap:4px;align-items:center;flex-wrap:wrap;font-family:'Public Sans',sans-serif;font-size:13.5px;font-weight:600\">\n      <a href=\"#/latest\" style=\"text-decoration:none;padding:7px 11px;border-radius:8px;color:{{ navLatest }}\">Latest<\u002Fa>\n      <a href=\"#/good\" style=\"text-decoration:none;padding:7px 11px;border-radius:8px;color:{{ navGood }}\">Good<\u002Fa>\n      <a href=\"#/bad\" style=\"text-decoration:none;padding:7px 11px;border-radius:8px;color:{{ navBad }}\">Bad<\u002Fa>\n      <a href=\"#/both\" style=\"text-decoration:none;padding:7px 11px;border-radius:8px;color:{{ navBoth }}\">Both<\u002Fa>\n      <a href=\"#/map\" style=\"text-decoration:none;padding:7px 11px;border-radius:8px;color:{{ navMap }}\">Map<\u002Fa>\n      <a href=\"#/digest\" style=\"text-decoration:none;padding:7px 11px;border-radius:8px;color:{{ navDigest }}\">Digest<\u002Fa>\n      <a href=\"#/about\" style=\"text-decoration:none;padding:7px 11px;border-radius:8px;color:{{ navAbout }}\">About<\u002Fa>\n      <a href=\"#/standards\" style=\"text-decoration:none;padding:7px 11px;border-radius:8px;color:{{ navStandards }}\">Standards<\u002Fa>\n      <a href=\"#/partners\" style=\"text-decoration:none;padding:7px 11px;border-radius:8px;color:{{ navPartners }}\">Partners<\u002Fa>\n      <sc-if value=\"{{ showAdmin }}\" hint-placeholder-val=\"{{ true }}\">\n        <a href=\"#/admin\" style=\"text-decoration:none;padding:7px 11px;border-radius:8px;color:{{ navAdmin }};font-family:'IBM Plex Mono',monospace;font-size:12px\">Moderation<\u002Fa>\n      <\u002Fsc-if>\n      <a href=\"#/submit\" style=\"text-decoration:none;background:#161616;color:#fff;border-radius:999px;padding:9px 16px;font-weight:700;margin-left:6px\">Submit a Signal<\u002Fa>\n    <\u002Fnav>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<main style=\"flex:1\">\n\n<!-- ============ HOME ============ -->\n<sc-if value=\"{{ isHome }}\" hint-placeholder-val=\"{{ true }}\">\n<div style=\"\">\n  <section style=\"max-width:1240px;margin:0 auto;padding:64px 24px 30px;display:grid;grid-template-columns:1.3fr 0.7fr;gap:44px;align-items:end\">\n    <div>\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;letter-spacing:2px;color:#9a6a12;text-transform:uppercase;margin-bottom:18px\">A civic signal platform · Now live in two cities<\u002Fdiv>\n      <h1 style=\"font-family:'Spectral',serif;font-weight:800;font-size:clamp(46px,7vw,88px);line-height:0.93;letter-spacing:-2.5px;margin:0 0 22px\">Every city has two stories. Both matter.<\u002Fh1>\n      <p style=\"font-size:20px;line-height:1.5;color:#3a362e;max-width:660px;margin:0 0 28px\">Good News Bad News is a civic signal platform where residents submit the wins, concerns, patterns, and opportunities they're seeing around them. We review and organize those signals so a community can see what's working, what needs attention, and where to act next. Now launching in <strong>Spokane<\u002Fstrong> and <strong>Honolulu<\u002Fstrong>.<\u002Fp>\n      <div style=\"display:flex;gap:12px;flex-wrap:wrap;margin-bottom:22px\">\n        <a href=\"#/submit\" style=\"text-decoration:none;background:#19734a;color:#fff;border-radius:999px;padding:14px 24px;font-weight:700;font-size:16px\">Submit a Signal<\u002Fa>\n        <a href=\"#/latest\" style=\"text-decoration:none;background:transparent;color:#161616;border:1px solid #161616;border-radius:999px;padding:14px 24px;font-weight:700;font-size:16px\">Read the Latest<\u002Fa>\n        <a href=\"#/digest\" style=\"text-decoration:none;background:transparent;color:#161616;border:1px solid #d8cab2;border-radius:999px;padding:14px 24px;font-weight:700;font-size:16px\">Get the Weekly Digest<\u002Fa>\n      <\u002Fdiv>\n      <p style=\"font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:#6b675e;line-height:1.5;letter-spacing:0.2px;max-width:560px\">No gossip. No doxxing. No unsupported accusations. Just local signal, reviewed and organized.<\u002Fp>\n    <\u002Fdiv>\n    <aside style=\"background:#fffaf1;border:1px solid #d8cab2;border-radius:20px;padding:26px;box-shadow:0 10px 34px rgba(0,0,0,0.05)\">\n      <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:26px;margin:0 0 6px\">This week in {{ cityName }}<\u002Fh3>\n      <p style=\"font-size:14px;color:#5a564d;line-height:1.5;margin:0 0 14px\">The good, the bad, and the complicated - filtered through verified resident signals and human review.<\u002Fp>\n      <div style=\"display:flex;justify-content:space-between;border-top:1px solid #e4d8c2;padding:12px 0;font-size:14px\"><span style=\"color:#5a564d\">Published signals<\u002Fspan><strong style=\"font-family:'Spectral',serif;font-size:18px\">{{ statPublished }}<\u002Fstrong><\u002Fdiv>\n      <div style=\"display:flex;justify-content:space-between;border-top:1px solid #e4d8c2;padding:12px 0;font-size:14px\"><span style=\"color:#5a564d\">In moderation queue<\u002Fspan><strong style=\"font-family:'Spectral',serif;font-size:18px\">{{ statQueue }}<\u002Fstrong><\u002Fdiv>\n      <div style=\"display:flex;justify-content:space-between;border-top:1px solid #e4d8c2;padding:12px 0;font-size:14px\"><span style=\"color:#5a564d\">Most active area<\u002Fspan><strong style=\"font-family:'Spectral',serif;font-size:18px\">{{ activeArea }}<\u002Fstrong><\u002Fdiv>\n      <div style=\"display:flex;justify-content:space-between;border-top:1px solid #e4d8c2;padding:12px 0;font-size:14px\"><span style=\"color:#5a564d\">Saturday digest<\u002Fspan><strong style=\"font-family:'Spectral',serif;font-size:18px\">Good / Bad / Both<\u002Fstrong><\u002Fdiv>\n    <\u002Faside>\n  <\u002Fsection>\n\n  <section style=\"max-width:1240px;margin:0 auto;padding:8px 24px 30px\">\n    <div style=\"font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:1.6px;font-size:12px;color:#6b675e;border-bottom:1px solid #d8cab2;padding-bottom:12px;margin-bottom:22px\">Now launching in two cities<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px\">\n      <button onclick=\"{{ goSpokane }}\" style=\"text-align:left;cursor:pointer;background:#fffaf1;border:1px solid #d8cab2;border-radius:18px;padding:26px;display:flex;flex-direction:column;gap:9px\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:#9a6a12\">Washington<\u002Fdiv>\n        <h3 style=\"font-family:'Spectral',serif;font-weight:800;font-size:32px;margin:0;letter-spacing:-0.8px\">Spokane<\u002Fh3>\n        <p style=\"font-size:14.5px;line-height:1.5;color:#5a564d;margin:0\">Live across {{ spokaneHoods }} neighborhoods. Explore the signal map, read the latest feed, and submit what you're seeing.<\u002Fp>\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;color:#19734a;margin-top:4px\">Open the Spokane map →<\u002Fspan>\n      <\u002Fbutton>\n      <button onclick=\"{{ goHonolulu }}\" style=\"text-align:left;cursor:pointer;background:#fffaf1;border:1px solid #d8cab2;border-radius:18px;padding:26px;display:flex;flex-direction:column;gap:9px\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:#9a6a12\">Hawaiʻi<\u002Fdiv>\n        <h3 style=\"font-family:'Spectral',serif;font-weight:800;font-size:32px;margin:0;letter-spacing:-0.8px\">Honolulu<\u002Fh3>\n        <p style=\"font-size:14.5px;line-height:1.5;color:#5a564d;margin:0\">Live across {{ honoluluHoods }} neighborhoods, from Waikīkī to Kalihi. See where the island's wins and concerns are clustering.<\u002Fp>\n        <span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:700;color:#19734a;margin-top:4px\">Open the Honolulu map →<\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <div style=\"background:#161616;color:#fff;overflow:hidden;white-space:nowrap;font-family:'IBM Plex Mono',monospace;font-size:12.5px;letter-spacing:0.4px\">\n    <div style=\"display:inline-block;padding:11px 0;animation:gnbn-ticker 46s linear infinite\">{{ tickerText }}{{ tickerText }}<\u002Fdiv>\n  <\u002Fdiv>\n\n  <section style=\"max-width:1240px;margin:0 auto;padding:56px 24px 10px\">\n    <div style=\"font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:1.6px;font-size:12px;color:#6b675e;border-bottom:1px solid #d8cab2;padding-bottom:12px;margin-bottom:26px\">How it works<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:18px\">\n      <div style=\"background:#fffaf1;border:1px solid #d8cab2;border-radius:18px;padding:22px\">\n        <div style=\"font-family:'Spectral',serif;font-weight:800;font-size:34px;color:#9a6a12;line-height:1;margin-bottom:12px\">1<\u002Fdiv>\n        <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:21px;margin:0 0 8px\">Residents submit signals<\u002Fh3>\n        <p style=\"font-size:14.5px;line-height:1.5;color:#5a564d;margin:0\">Share a win, concern, pattern, opportunity, or question from your neighborhood.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#fffaf1;border:1px solid #d8cab2;border-radius:18px;padding:22px\">\n        <div style=\"font-family:'Spectral',serif;font-weight:800;font-size:34px;color:#9a6a12;line-height:1;margin-bottom:12px\">2<\u002Fdiv>\n        <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:21px;margin:0 0 8px\">We review and organize<\u002Fh3>\n        <p style=\"font-size:14.5px;line-height:1.5;color:#5a564d;margin:0\">Submissions are checked for clarity, safety, location, topic, and possible verification.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#fffaf1;border:1px solid #d8cab2;border-radius:18px;padding:22px\">\n        <div style=\"font-family:'Spectral',serif;font-weight:800;font-size:34px;color:#9a6a12;line-height:1;margin-bottom:12px\">3<\u002Fdiv>\n        <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:21px;margin:0 0 8px\">The community sees the pattern<\u002Fh3>\n        <p style=\"font-size:14.5px;line-height:1.5;color:#5a564d;margin:0\">Some become public posts, some become stories, some are combined into pattern reports.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#fffaf1;border:1px solid #d8cab2;border-radius:18px;padding:22px\">\n        <div style=\"font-family:'Spectral',serif;font-weight:800;font-size:34px;color:#9a6a12;line-height:1;margin-bottom:12px\">4<\u002Fdiv>\n        <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:21px;margin:0 0 8px\">People respond<\u002Fh3>\n        <p style=\"font-size:14.5px;line-height:1.5;color:#5a564d;margin:0\">Residents, nonprofits, businesses, churches, and civic leaders see where help is needed.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section style=\"max-width:1240px;margin:0 auto;padding:46px 24px 10px\">\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:18px\">\n      <a href=\"#/good\" style=\"text-decoration:none;display:block;background:#fffaf1;border:1px solid #19734a59;border-left:5px solid #19734a;border-radius:16px;padding:24px\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-weight:600;letter-spacing:1.4px;font-size:12px;color:#19734a;text-transform:uppercase;margin-bottom:10px\">Good News<\u002Fdiv>\n        <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:24px;margin:0 0 8px;color:#161616\">The wins worth celebrating.<\u002Fh3>\n        <p style=\"font-size:14.5px;line-height:1.5;color:#5a564d;margin:0\">Improvements, inspiring people, promising programs, and local momentum.<\u002Fp>\n      <\u002Fa>\n      <a href=\"#/bad\" style=\"text-decoration:none;display:block;background:#fffaf1;border:1px solid #a3342959;border-left:5px solid #a33429;border-radius:16px;padding:24px\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-weight:600;letter-spacing:1.4px;font-size:12px;color:#a33429;text-transform:uppercase;margin-bottom:10px\">Bad News<\u002Fdiv>\n        <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:24px;margin:0 0 8px;color:#161616\">The problems that need attention.<\u002Fh3>\n        <p style=\"font-size:14.5px;line-height:1.5;color:#5a564d;margin:0\">Risks, gaps, failures, and early warnings - surfaced constructively.<\u002Fp>\n      <\u002Fa>\n      <a href=\"#/both\" style=\"text-decoration:none;display:block;background:#fffaf1;border:1px solid #c99a2e80;border-left:5px solid #c99a2e;border-radius:16px;padding:24px\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-weight:600;letter-spacing:1.4px;font-size:12px;color:#9a6a12;text-transform:uppercase;margin-bottom:10px\">Both<\u002Fdiv>\n        <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:24px;margin:0 0 8px;color:#161616\">Where progress and problems coexist.<\u002Fh3>\n        <p style=\"font-size:14.5px;line-height:1.5;color:#5a564d;margin:0\">The complicated stories that don't fit a single label.<\u002Fp>\n      <\u002Fa>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section style=\"max-width:1240px;margin:0 auto;padding:50px 24px 10px\">\n    <div style=\"display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1px solid #d8cab2;padding-bottom:12px;margin-bottom:26px;gap:16px;flex-wrap:wrap\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:1.6px;font-size:12px;color:#6b675e\">Latest signals<\u002Fdiv>\n      <a href=\"#/latest\" style=\"text-decoration:none;font-size:13.5px;font-weight:700;color:#19734a\">See the full feed →<\u002Fa>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:18px\">\n      <sc-for list=\"{{ homePosts }}\" as=\"post\" hint-placeholder-count=\"3\">\n        <article onclick=\"{{ post.open }}\" style=\"cursor:pointer;background:#fffaf1;border:1px solid #d8cab2;border-radius:16px;padding:20px;display:flex;flex-direction:column;gap:10px;min-height:210px\">\n          <div style=\"display:flex;gap:7px;flex-wrap:wrap\">\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-weight:600;letter-spacing:1px;font-size:10.5px;text-transform:uppercase;padding:4px 8px;border-radius:999px;color:{{ post.catColor }};background:{{ post.catBg }};border:1px solid {{ post.catBorder }}\">{{ post.catLabel }}<\u002Fspan>\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-weight:600;letter-spacing:0.6px;font-size:10.5px;text-transform:uppercase;padding:4px 8px;border-radius:999px;color:{{ post.statusColor }};border:1px solid {{ post.statusBorder }}\">{{ post.status }}<\u002Fspan>\n          <\u002Fdiv>\n          <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:20px;line-height:1.15;margin:0\">{{ post.title }}<\u002Fh3>\n          <p style=\"font-size:14px;line-height:1.45;color:#5a564d;margin:0;flex:1\">{{ post.summary }}<\u002Fp>\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#8a857a;letter-spacing:0.3px\">{{ post.metaLine }}<\u002Fdiv>\n        <\u002Farticle>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section style=\"max-width:1240px;margin:0 auto;padding:52px 24px\">\n    <div style=\"background:#161616;color:#fff;border-radius:24px;padding:46px;display:grid;grid-template-columns:1.4fr 1fr;gap:40px;align-items:center\">\n      <div>\n        <h2 style=\"font-family:'Spectral',serif;font-weight:800;font-size:38px;line-height:1.05;letter-spacing:-1px;margin:0 0 14px\">Seen something {{ cityName }} should know?<\u002Fh2>\n        <p style=\"font-size:17px;line-height:1.55;color:#cfc8b9;margin:0 0 22px;max-width:520px\">Submit a signal. It can be a good story, a concern, a trend, a resource, or something you think people are missing.<\u002Fp>\n        <a href=\"#/submit\" style=\"text-decoration:none;display:inline-block;background:#19734a;color:#fff;border-radius:999px;padding:14px 26px;font-weight:700;font-size:16px\">Submit a Signal<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);border-radius:16px;padding:24px\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#c99a2e;margin-bottom:14px\">We review submissions before publication<\u002Fdiv>\n        <ul style=\"margin:0;padding-left:18px;font-size:14.5px;line-height:1.9;color:#e7e1d4\">\n          <li>We report patterns, not rumors.<\u002Fli>\n          <li>We don't publish private personal information.<\u002Fli>\n          <li>A submitted signal is not a verified fact.<\u002Fli>\n          <li>Some submissions are used only as background intelligence.<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ FEED (Latest / Good / Bad / Both) ============ -->\n<sc-if value=\"{{ isFeed }}\">\n<div style=\"\">\n  <section style=\"max-width:1240px;margin:0 auto;padding:48px 24px 0\">\n    <div style=\"font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:1.6px;font-size:12px;color:#6b675e;margin-bottom:14px\">{{ feedKicker }}<\u002Fdiv>\n    <h1 style=\"font-family:'Spectral',serif;font-weight:800;font-size:clamp(38px,5vw,60px);line-height:1;letter-spacing:-1.8px;margin:0 0 14px\">{{ feedTitle }}<\u002Fh1>\n    <p style=\"font-size:18px;line-height:1.5;color:#5a564d;max-width:720px;margin:0 0 28px\">{{ feedDesc }}<\u002Fp>\n  <\u002Fsection>\n\n  <section style=\"max-width:1240px;margin:0 auto;padding:0 24px 12px\">\n    <div style=\"background:#fbf4e6;border:1px solid #d8cab2;border-radius:18px;padding:14px;display:flex;flex-wrap:wrap;gap:10px;align-items:center\">\n      <input value=\"{{ fSearch }}\" oninput=\"{{ onSearch }}\" placeholder=\"Search signals…\" style=\"flex:1;min-width:200px;border:1px solid #d8cab2;background:#fffdf8;padding:11px 13px;border-radius:10px;font-size:14.5px;color:#161616\">\n      <select value=\"{{ fTopic }}\" onchange=\"{{ onTopic }}\" style=\"border:1px solid #d8cab2;background:#fffdf8;padding:11px 13px;border-radius:10px;font-size:14px;color:#161616\">\n        <sc-for list=\"{{ topicOptions }}\" as=\"t\" hint-placeholder-count=\"4\"><option value=\"{{ t }}\">{{ t }}<\u002Foption><\u002Fsc-for>\n      <\u002Fselect>\n      <select value=\"{{ fHood }}\" onchange=\"{{ onHood }}\" style=\"border:1px solid #d8cab2;background:#fffdf8;padding:11px 13px;border-radius:10px;font-size:14px;color:#161616\">\n        <sc-for list=\"{{ hoodOptions }}\" as=\"h\" hint-placeholder-count=\"4\"><option value=\"{{ h }}\">{{ h }}<\u002Foption><\u002Fsc-for>\n      <\u002Fselect>\n      <select value=\"{{ fSort }}\" onchange=\"{{ onSort }}\" style=\"border:1px solid #d8cab2;background:#fffdf8;padding:11px 13px;border-radius:10px;font-size:14px;color:#161616\">\n        <option value=\"latest\">Newest first<\u002Foption>\n        <option value=\"helpful\">Most helpful<\u002Foption>\n      <\u002Fselect>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <sc-if value=\"{{ showCatChips }}\">\n  <section style=\"max-width:1240px;margin:0 auto;padding:12px 24px 0\">\n    <div style=\"display:flex;flex-wrap:wrap;gap:8px\">\n      <sc-for list=\"{{ catChips }}\" as=\"chip\" hint-placeholder-count=\"5\">\n        <button onclick=\"{{ chip.onClick }}\" style=\"border:1px solid {{ chip.border }};background:{{ chip.bg }};color:{{ chip.color }};border-radius:999px;padding:9px 14px;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;letter-spacing:0.5px;cursor:pointer;text-transform:uppercase\">{{ chip.label }}<\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <\u002Fsc-if>\n\n  <section style=\"max-width:1240px;margin:0 auto;padding:24px 24px 64px\">\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#8a857a;letter-spacing:0.4px;margin-bottom:18px\">{{ feedCountLine }}<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:18px\">\n      <sc-for list=\"{{ feedPosts }}\" as=\"post\" hint-placeholder-count=\"6\">\n        <article onclick=\"{{ post.open }}\" style=\"cursor:pointer;background:#fffaf1;border:1px solid #d8cab2;border-radius:16px;padding:20px;display:flex;flex-direction:column;gap:11px;min-height:230px\">\n          <sc-if value=\"{{ post.hasPhoto }}\" hint-placeholder-val=\"{{ false }}\">{{ post.cardPhotoEl }}<\u002Fsc-if>\n          <div style=\"display:flex;gap:7px;flex-wrap:wrap\">\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-weight:600;letter-spacing:1px;font-size:10.5px;text-transform:uppercase;padding:4px 8px;border-radius:999px;color:{{ post.catColor }};background:{{ post.catBg }};border:1px solid {{ post.catBorder }}\">{{ post.catLabel }}<\u002Fspan>\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-weight:600;letter-spacing:0.6px;font-size:10.5px;text-transform:uppercase;padding:4px 8px;border-radius:999px;color:{{ post.statusColor }};border:1px solid {{ post.statusBorder }}\">{{ post.status }}<\u002Fspan>\n          <\u002Fdiv>\n          <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:21px;line-height:1.15;margin:0\">{{ post.title }}<\u002Fh3>\n          <p style=\"font-size:14px;line-height:1.45;color:#5a564d;margin:0;flex:1\">{{ post.summary }}<\u002Fp>\n          <div style=\"display:flex;flex-wrap:wrap;gap:6px\">\n            <sc-for list=\"{{ post.topics }}\" as=\"topic\" hint-placeholder-count=\"2\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#6b675e;border:1px solid #e0d4be;border-radius:999px;padding:4px 8px;background:#fffdf8\">{{ topic }}<\u002Fspan><\u002Fsc-for>\n          <\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;align-items:center;border-top:1px solid #ece1cd;padding-top:10px\">\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#8a857a\">{{ post.metaLine }}<\u002Fspan>\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#19734a;font-weight:600\">{{ post.helpfulLine }}<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Farticle>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <sc-if value=\"{{ feedEmpty }}\">\n      <div style=\"text-align:center;padding:60px 20px;color:#8a857a;font-size:16px\">No signals match these filters yet. <a href=\"#/submit\" style=\"color:#19734a;font-weight:700\">Submit one →<\u002Fa><\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fsection>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ POST DETAIL ============ -->\n<sc-if value=\"{{ isPost }}\">\n<div style=\"\">\n  <article style=\"max-width:760px;margin:0 auto;padding:44px 24px 70px\">\n    <a href=\"{{ backHref }}\" style=\"text-decoration:none;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#6b675e;letter-spacing:0.5px\">← Back to feed<\u002Fa>\n    <div style=\"display:flex;gap:8px;flex-wrap:wrap;margin:22px 0 16px\">\n      <span style=\"font-family:'IBM Plex Mono',monospace;font-weight:600;letter-spacing:1px;font-size:11px;text-transform:uppercase;padding:5px 10px;border-radius:999px;color:{{ detail.catColor }};background:{{ detail.catBg }};border:1px solid {{ detail.catBorder }}\">{{ detail.catLabel }}<\u002Fspan>\n      <span style=\"font-family:'IBM Plex Mono',monospace;font-weight:600;letter-spacing:0.6px;font-size:11px;text-transform:uppercase;padding:5px 10px;border-radius:999px;color:{{ detail.statusColor }};border:1px solid {{ detail.statusBorder }}\">{{ detail.status }}<\u002Fspan>\n    <\u002Fdiv>\n    <h1 style=\"font-family:'Spectral',serif;font-weight:800;font-size:clamp(32px,4.4vw,46px);line-height:1.05;letter-spacing:-1.4px;margin:0 0 16px\">{{ detail.title }}<\u002Fh1>\n    <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12.5px;color:#8a857a;letter-spacing:0.3px;border-bottom:1px solid #d8cab2;padding-bottom:20px;margin-bottom:24px\">{{ detail.metaLine }}<\u002Fdiv>\n    <sc-if value=\"{{ detail.hasPhoto }}\" hint-placeholder-val=\"{{ false }}\">{{ detail.detailPhotoEl }}<\u002Fsc-if>\n    <sc-for list=\"{{ detail.body }}\" as=\"para\" hint-placeholder-count=\"3\">\n      <p style=\"font-family:'Spectral',serif;font-size:19px;line-height:1.62;color:#2b2820;margin:0 0 20px\">{{ para }}<\u002Fp>\n    <\u002Fsc-for>\n\n    <div style=\"background:#fbf4e6;border:1px solid #d8cab2;border-radius:16px;padding:22px;margin:8px 0 24px\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:#9a6a12;margin-bottom:10px\">What happens next<\u002Fdiv>\n      <p style=\"font-size:15px;line-height:1.55;color:#3a362e;margin:0\">{{ detail.nextStep }}<\u002Fp>\n    <\u002Fdiv>\n\n    <div style=\"display:flex;flex-wrap:wrap;gap:10px;border-top:1px solid #d8cab2;padding-top:22px\">\n      <button onclick=\"{{ detail.seen }}\" style=\"border:1px solid #19734a;background:#19734a14;color:#19734a;border-radius:999px;padding:11px 18px;font-weight:700;font-size:14px;cursor:pointer\">✓ I've seen this too · {{ detail.seenCount }}<\u002Fbutton>\n      <button onclick=\"{{ onHelp }}\" style=\"border:1px solid #285d83;background:#285d831a;color:#285d83;border-radius:999px;padding:11px 18px;font-weight:700;font-size:14px;cursor:pointer\">I can help<\u002Fbutton>\n      <button onclick=\"{{ detail.follow }}\" style=\"border:1px solid #d8cab2;background:#fffdf8;color:#161616;border-radius:999px;padding:11px 18px;font-weight:700;font-size:14px;cursor:pointer\">{{ detail.followLabel }}<\u002Fbutton>\n    <\u002Fdiv>\n    <sc-if value=\"{{ helpOpen }}\">\n      <div style=\"background:#fffaf1;border:1px solid #285d834d;border-radius:16px;padding:20px;margin-top:18px\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:#285d83;margin-bottom:10px\">Respond to a community need<\u002Fdiv>\n        <p style=\"font-size:14.5px;color:#3a362e;margin:0 0 12px\">Are you part of an organization, business, church, agency, or neighborhood group that can help? Tell us what's available.<\u002Fp>\n        <select style=\"width:100%;border:1px solid #d8cab2;background:#fffdf8;padding:11px;border-radius:10px;font-size:14px;margin-bottom:12px\"><option>I can volunteer<\u002Foption><option>I can mentor<\u002Foption><option>I can donate supplies<\u002Foption><option>I know someone who can help<\u002Foption><\u002Fselect>\n        <button onclick=\"{{ submitHelp }}\" style=\"border:none;background:#285d83;color:#fff;border-radius:999px;padding:11px 18px;font-weight:700;font-size:14px;cursor:pointer\">Submit response<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Farticle>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ SUBMIT ============ -->\n<sc-if value=\"{{ isSubmit }}\">\n<div style=\"\">\n  <section style=\"max-width:820px;margin:0 auto;padding:48px 24px 70px\">\n    <div style=\"font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:1.6px;font-size:12px;color:#6b675e;margin-bottom:14px\">Submit a Signal<\u002Fdiv>\n    <h1 style=\"font-family:'Spectral',serif;font-weight:800;font-size:clamp(34px,4.6vw,52px);line-height:1;letter-spacing:-1.6px;margin:0 0 14px\">What are you seeing in {{ cityName }}?<\u002Fh1>\n    <p style=\"font-size:17px;line-height:1.5;color:#5a564d;max-width:640px;margin:0 0 22px\">Share real stories about public life in {{ cityName }} - a good thing happening, a problem that needs attention, a pattern, a resource, or an opportunity. {{ submitFeeLine }} Add a photo and tags if you have them.<\u002Fp>\n\n    <div style=\"background:#fff8eb;border:1px solid #c99a2e80;border-radius:14px;padding:16px 18px;margin-bottom:26px\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:#9a6a12;margin-bottom:8px\">Public civic stories only<\u002Fdiv>\n      <p style=\"font-size:13.5px;line-height:1.55;color:#5a564d;margin:0\">This is a platform for the public life of the city - not personal disputes. Please don't post about cheaters, divorces, family conflicts, or private individuals. No doxxing, threats, or private personal information. Keep it about places, systems, and community.<\u002Fp>\n    <\u002Fdiv>\n\n    <sc-if value=\"{{ submitted }}\" hint-placeholder-val=\"{{ false }}\">\n      <div style=\"background:#19734a;color:#fff;border-radius:20px;padding:36px;text-align:center;\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;letter-spacing:1.6px;text-transform:uppercase;color:#bfe6d3;margin-bottom:12px\">Signal received<\u002Fdiv>\n        <h2 style=\"font-family:'Spectral',serif;font-weight:700;font-size:30px;margin:0 0 12px\">Thanks - it's in the queue.<\u002Fh2>\n        <p style=\"font-size:16px;line-height:1.55;color:#e7f2ec;max-width:520px;margin:0 auto 12px\">Our team will review it before anything is published. Some submissions become public stories, some become background signals, and some are combined with other reports to identify patterns.<\u002Fp>\n        <div style=\"background:rgba(255,255,255,0.1);border-radius:12px;padding:14px;max-width:520px;margin:0 auto 22px;text-align:left\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:#bfe6d3;margin-bottom:8px\">Automated safety scan<\u002Fdiv>\n          <p style=\"font-size:14px;line-height:1.5;color:#fff;margin:0\">{{ scanMessage }}<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:10px;justify-content:center;flex-wrap:wrap\">\n          <a href=\"#/latest\" style=\"text-decoration:none;background:#fff;color:#19734a;border-radius:999px;padding:12px 22px;font-weight:700\">Read the feed<\u002Fa>\n          <button onclick=\"{{ resetForm }}\" style=\"border:1px solid rgba(255,255,255,0.6);background:transparent;color:#fff;border-radius:999px;padding:12px 22px;font-weight:700;cursor:pointer\">Submit another<\u002Fbutton>\n          <sc-if value=\"{{ showAdmin }}\"><a href=\"#/admin\" style=\"text-decoration:none;border:1px solid rgba(255,255,255,0.6);background:transparent;color:#fff;border-radius:999px;padding:12px 22px;font-weight:700\">See it in moderation<\u002Fa><\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <sc-if value=\"{{ formOpen }}\" hint-placeholder-val=\"{{ true }}\">\n    <div>\n      <div style=\"display:flex;gap:8px;flex-wrap:wrap;margin-bottom:28px\">\n        <sc-for list=\"{{ steps }}\" as=\"s\" hint-placeholder-count=\"4\">\n          <span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;border-radius:999px;padding:8px 12px;border:1px solid {{ s.border }};background:{{ s.bg }};color:{{ s.color }}\">{{ s.label }}<\u002Fspan>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n\n      <sc-if value=\"{{ step1 }}\" hint-placeholder-val=\"{{ true }}\">\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px\">\n        <div style=\"grid-column:1/-1\"><label style=\"display:block;font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#8a857a;margin-bottom:7px;font-weight:600\">Signal title<\u002Flabel><input value=\"{{ form.title }}\" oninput=\"{{ onTitle }}\" placeholder=\"A short, specific Spokane headline\" style=\"width:100%;border:1px solid #d8cab2;background:#fffdf8;padding:12px;border-radius:11px;font-size:15px\"><\u002Fdiv>\n        <div><label style=\"display:block;font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#8a857a;margin-bottom:7px;font-weight:600\">What kind of signal?<\u002Flabel><select value=\"{{ form.type }}\" onchange=\"{{ onType }}\" style=\"width:100%;border:1px solid #d8cab2;background:#fffdf8;padding:12px;border-radius:11px;font-size:15px\"><option>Good News<\u002Foption><option>Bad News<\u002Foption><option>Both<\u002Foption><option>Opportunity<\u002Foption><option>Signal<\u002Foption><option>Pattern / Trend<\u002Foption><option>Question<\u002Foption><\u002Fselect><\u002Fdiv>\n        <div><label style=\"display:block;font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#8a857a;margin-bottom:7px;font-weight:600\">Topic<\u002Flabel><select value=\"{{ form.topic }}\" onchange=\"{{ onTopic2 }}\" style=\"width:100%;border:1px solid #d8cab2;background:#fffdf8;padding:12px;border-radius:11px;font-size:15px\"><sc-for list=\"{{ topicList }}\" as=\"t\" hint-placeholder-count=\"6\"><option>{{ t }}<\u002Foption><\u002Fsc-for><\u002Fselect><\u002Fdiv>\n        <div><label style=\"display:block;font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#8a857a;margin-bottom:7px;font-weight:600\">Neighborhood<\u002Flabel><select value=\"{{ form.neighborhood }}\" onchange=\"{{ onHoodField }}\" style=\"width:100%;border:1px solid #d8cab2;background:#fffdf8;padding:12px;border-radius:11px;font-size:15px\"><sc-for list=\"{{ hoodList }}\" as=\"h\" hint-placeholder-count=\"5\"><option>{{ h }}<\u002Foption><\u002Fsc-for><\u002Fselect><\u002Fdiv>\n        <div><label style=\"display:block;font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#8a857a;margin-bottom:7px;font-weight:600\">Cross-streets (optional)<\u002Flabel><input value=\"{{ form.cross }}\" oninput=\"{{ onCross }}\" placeholder=\"e.g. Monroe &amp; Montgomery\" style=\"width:100%;border:1px solid #d8cab2;background:#fffdf8;padding:12px;border-radius:11px;font-size:15px\"><\u002Fdiv>\n        <div style=\"grid-column:1/-1\"><label style=\"display:block;font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#8a857a;margin-bottom:7px;font-weight:600\">What did you observe?<\u002Flabel><textarea value=\"{{ form.body }}\" oninput=\"{{ onBody }}\" placeholder=\"Describe what's happening in the city. Be specific about the place and the situation. Keep it about public life, not private individuals.\" style=\"width:100%;border:1px solid #d8cab2;background:#fffdf8;padding:12px;border-radius:11px;font-size:15px;min-height:150px;resize:vertical;font-family:'Public Sans',sans-serif\"><\u002Ftextarea><\u002Fdiv>\n        <div style=\"grid-column:1/-1\"><label style=\"display:block;font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#8a857a;margin-bottom:7px;font-weight:600\">Tags (comma separated, optional)<\u002Flabel><input value=\"{{ form.tags }}\" oninput=\"{{ onTags }}\" placeholder=\"e.g. downtown, cleanup, youth\" style=\"width:100%;border:1px solid #d8cab2;background:#fffdf8;padding:12px;border-radius:11px;font-size:15px\"><\u002Fdiv>\n        <div style=\"grid-column:1/-1\">\n          <label style=\"display:block;font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#8a857a;margin-bottom:7px;font-weight:600\">Photo (optional)<\u002Flabel>\n          <sc-if value=\"{{ hasPhoto }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"display:flex;gap:14px;align-items:center;background:#fffdf8;border:1px solid #d8cab2;border-radius:12px;padding:12px\">\n              {{ photoThumbEl }}\n              <div style=\"flex:1;min-width:0\"><div style=\"font-size:13.5px;color:#3a362e;overflow:hidden;text-overflow:ellipsis;white-space:nowrap\">{{ photoName }}<\u002Fdiv><div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#8a857a;margin-top:2px\">Only upload photos of public places or conditions you have the right to share.<\u002Fdiv><\u002Fdiv>\n              <button onclick=\"{{ removePhoto }}\" style=\"border:1px solid #a3342959;background:#a3342914;color:#a33429;border-radius:9px;padding:8px 12px;font-size:12.5px;font-weight:700;cursor:pointer\">Remove<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n          <sc-if value=\"{{ noPhoto }}\" hint-placeholder-val=\"{{ true }}\">\n            <label style=\"display:flex;align-items:center;gap:12px;border:1px dashed #c2b294;background:#fffdf8;border-radius:12px;padding:16px;cursor:pointer\">\n              <span style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#9a6a12;border:1px solid #c99a2e80;border-radius:8px;padding:8px 12px;font-weight:600\">Choose photo<\u002Fspan>\n              <span style=\"font-size:13px;color:#8a857a\">JPG or PNG. Public conditions only - no faces of minors, license plates, or private details.<\u002Fspan>\n              <input type=\"file\" accept=\"image/*\" onchange=\"{{ onPhoto }}\" style=\"display:none\">\n            <\u002Flabel>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top:22px\"><button onclick=\"{{ next2 }}\" style=\"border:none;background:#161616;color:#fff;border-radius:999px;padding:13px 24px;font-weight:700;font-size:15px;cursor:pointer\">Next: Safety check →<\u002Fbutton><\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ step2 }}\">\n      <div style=\"display:flex;flex-direction:column;gap:11px\">\n        <label style=\"display:flex;gap:11px;align-items:flex-start;padding:14px;border:1px solid #d8cab2;border-radius:13px;background:#fffdf8;font-size:14.5px;color:#3a362e;cursor:pointer\"><input type=\"checkbox\" checked=\"{{ form.c0 }}\" onchange=\"{{ onC0 }}\" style=\"width:auto;margin-top:2px\">I did not name a minor or identify them in a sensitive context.<\u002Flabel>\n        <label style=\"display:flex;gap:11px;align-items:flex-start;padding:14px;border:1px solid #d8cab2;border-radius:13px;background:#fffdf8;font-size:14.5px;color:#3a362e;cursor:pointer\"><input type=\"checkbox\" checked=\"{{ form.c1 }}\" onchange=\"{{ onC1 }}\" style=\"width:auto;margin-top:2px\">I did not include private medical, addiction, or family details about an identifiable person.<\u002Flabel>\n        <label style=\"display:flex;gap:11px;align-items:flex-start;padding:14px;border:1px solid #d8cab2;border-radius:13px;background:#fffdf8;font-size:14.5px;color:#3a362e;cursor:pointer\"><input type=\"checkbox\" checked=\"{{ form.c2 }}\" onchange=\"{{ onC2 }}\" style=\"width:auto;margin-top:2px\">This is a public, civic story - not a personal dispute or a complaint about a private individual.<\u002Flabel>\n      <\u002Fdiv>\n      <sc-if value=\"{{ safetyWarn }}\"><div style=\"margin-top:14px;background:#a3342914;border:1px solid #a3342959;border-radius:12px;padding:13px 15px;font-size:13.5px;color:#a33429\">Please confirm all three before continuing - these protect you and the people in your story.<\u002Fdiv><\u002Fsc-if>\n      <div style=\"margin-top:22px;display:flex;gap:10px;flex-wrap:wrap\"><button onclick=\"{{ back1 }}\" style=\"border:1px solid #d8cab2;background:#fffdf8;color:#161616;border-radius:999px;padding:13px 22px;font-weight:700;font-size:15px;cursor:pointer\">← Back<\u002Fbutton><button onclick=\"{{ toReview }}\" style=\"border:none;background:#161616;color:#fff;border-radius:999px;padding:13px 24px;font-weight:700;font-size:15px;cursor:pointer\">Next: Review →<\u002Fbutton><\u002Fdiv>\n      <\u002Fsc-if>\n\n      <sc-if value=\"{{ step3 }}\">\n      <div style=\"background:#fffaf1;border:1px solid #d8cab2;border-radius:16px;padding:24px\">\n        <sc-if value=\"{{ hasPhoto }}\" hint-placeholder-val=\"{{ false }}\">{{ photoReviewEl }}<\u002Fsc-if>\n        <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:24px;margin:0 0 8px\">{{ reviewTitle }}<\u002Fh3>\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:12px;color:#8a857a;margin-bottom:14px\">{{ reviewMeta }}<\u002Fdiv>\n        <p style=\"font-size:15px;line-height:1.55;color:#3a362e;margin:0 0 8px\">{{ reviewBody }}<\u002Fp>\n      <\u002Fdiv>\n      <p style=\"font-size:13.5px;color:#6b675e;margin:16px 0 0\">{{ submitButtonNote }}<\u002Fp>\n      <div style=\"margin-top:14px;display:flex;gap:10px;flex-wrap:wrap\"><button onclick=\"{{ back2 }}\" style=\"border:1px solid #d8cab2;background:#fffdf8;color:#161616;border-radius:999px;padding:13px 22px;font-weight:700;font-size:15px;cursor:pointer\">← Back<\u002Fbutton><button onclick=\"{{ doSubmit }}\" style=\"border:none;background:#19734a;color:#fff;border-radius:999px;padding:13px 26px;font-weight:700;font-size:15px;cursor:pointer\">{{ submitButtonLabel }}<\u002Fbutton><\u002Fdiv>\n      <\u002Fsc-if>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fsection>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ DIGEST ============ -->\n<sc-if value=\"{{ isDigest }}\">\n<div style=\"\">\n  <section style=\"max-width:820px;margin:0 auto;padding:48px 24px 70px\">\n    <div style=\"font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:1.6px;font-size:12px;color:#6b675e;margin-bottom:14px\">The Saturday Digest<\u002Fdiv>\n    <h1 style=\"font-family:'Spectral',serif;font-weight:800;font-size:clamp(34px,4.6vw,52px);line-height:1;letter-spacing:-1.6px;margin:0 0 14px\">The Good, the Bad, and the Real {{ cityName }}.<\u002Fh1>\n    <p style=\"font-size:17px;line-height:1.5;color:#5a564d;max-width:640px;margin:0 0 30px\">Every Saturday, a city briefing built from what residents are seeing on the ground: three wins, three concerns, one complicated story, three ways to help, and one question for the community.<\u002Fp>\n\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:24px\">\n      <sc-for list=\"{{ digestOptions }}\" as=\"opt\" hint-placeholder-count=\"4\">\n        <button onclick=\"{{ opt.onClick }}\" style=\"text-align:left;border:1px solid {{ opt.border }};background:{{ opt.bg }};border-radius:14px;padding:16px 18px;cursor:pointer;box-shadow:{{ opt.shadow }}\">\n          <strong style=\"display:block;font-family:'Spectral',serif;font-size:18px;margin-bottom:4px;color:#161616\">{{ opt.title }}<\u002Fstrong>\n          <span style=\"font-size:13.5px;color:#5a564d;line-height:1.45\">{{ opt.desc }}<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n\n    <div style=\"background:#fffaf1;border:1px solid #d8cab2;border-radius:16px;padding:22px;display:flex;gap:12px;flex-wrap:wrap;align-items:center\">\n      <input value=\"{{ digestEmail }}\" oninput=\"{{ onDigestEmail }}\" placeholder=\"you@example.com\" style=\"flex:1;min-width:220px;border:1px solid #d8cab2;background:#fffdf8;padding:13px;border-radius:11px;font-size:15px\">\n      <button onclick=\"{{ subscribe }}\" style=\"border:none;background:#161616;color:#fff;border-radius:999px;padding:13px 24px;font-weight:700;font-size:15px;cursor:pointer\">{{ subscribeLabel }}<\u002Fbutton>\n    <\u002Fdiv>\n    <sc-if value=\"{{ subscribed }}\"><div style=\"margin-top:14px;background:#19734a14;border:1px solid #19734a59;border-radius:12px;padding:13px 16px;font-size:14px;color:#19734a\">You're subscribed to: <strong>{{ digestPref }}<\u002Fstrong>. Look for the first Saturday briefing in your inbox.<\u002Fdiv><\u002Fsc-if>\n\n    <div style=\"background:#161616;color:#fff;border-radius:18px;padding:26px;margin-top:30px\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#c99a2e;margin-bottom:14px\">Issue 01 preview - \"The Good, the Bad, and the Real {{ cityName }}: Week One\"<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:16px;font-size:14.5px;line-height:1.5;color:#e7e1d4\">\n        <div><strong style=\"color:#7fcfa5\">3 wins<\u002Fstrong><br>Breakfast club, Sunday open gym, robotics mentors.<\u002Fdiv>\n        <div><strong style=\"color:#e89a8f\">3 concerns<\u002Fstrong><br>Streetlights near Monroe, downtown theft pattern, bus-stop safety.<\u002Fdiv>\n        <div><strong style=\"color:#e8c46f\">1 complicated story<\u002Fstrong><br>New shelter opened - more beds, poor neighbor communication.<\u002Fdiv>\n        <div><strong style=\"color:#9fb8d6\">1 question<\u002Fstrong><br>Where should Spokane add its next safe place for kids after school?<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ ABOUT ============ -->\n<sc-if value=\"{{ isAbout }}\">\n<div style=\"\">\n  <section style=\"max-width:760px;margin:0 auto;padding:56px 24px 70px\">\n    <div style=\"font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:1.6px;font-size:12px;color:#6b675e;margin-bottom:14px\">About<\u002Fdiv>\n    <h1 style=\"font-family:'Spectral',serif;font-weight:800;font-size:clamp(34px,4.8vw,56px);line-height:1.02;letter-spacing:-1.8px;margin:0 0 24px\">A clearer signal for your city.<\u002Fh1>\n    <p style=\"font-family:'Spectral',serif;font-size:21px;line-height:1.6;color:#2b2820;margin:0 0 20px\">Cities do not fail because nobody cares. They fail because the signal gets buried. Good work goes unnoticed. Problems become rumors. Residents see patterns long before institutions do - but there is no trusted place to send what they're seeing.<\u002Fp>\n    <p style=\"font-family:'Spectral',serif;font-size:21px;line-height:1.6;color:#2b2820;margin:0 0 32px\">Good News Bad News exists to close that gap.<\u002Fp>\n    <div style=\"border-top:1px solid #d8cab2;padding-top:28px;display:grid;grid-template-columns:1fr 1fr;gap:24px\">\n      <div><h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:22px;margin:0 0 8px\">What it is<\u002Fh3><p style=\"font-size:15.5px;line-height:1.55;color:#5a564d;margin:0\">A moderated, community-powered signal system - part civic newsroom, part neighborhood early-warning system, part public square with rules.<\u002Fp><\u002Fdiv>\n      <div><h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:22px;margin:0 0 8px\">What it is not<\u002Fh3><p style=\"font-size:15.5px;line-height:1.55;color:#5a564d;margin:0\">Not a complaint board. Not Nextdoor. Not a city portal. Not anonymous gossip. The point isn't to make {{ cityName }} look good or bad - it's to help the city see clearly.<\u002Fp><\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fff8eb;border:1px solid #c99a2e80;border-radius:16px;padding:24px;margin-top:32px\">\n      <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:22px;margin:0 0 8px\">Open, but not reckless.<\u002Fh3>\n      <p style=\"font-size:15.5px;line-height:1.6;color:#3a362e;margin:0\">Make it easy for residents to submit raw signal, but hard for unverified claims to become public harm. Local, but not small. Honest, but not cynical. Constructive, but not sanitized.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ STANDARDS ============ -->\n<sc-if value=\"{{ isStandards }}\">\n<div style=\"\">\n  <section style=\"max-width:820px;margin:0 auto;padding:56px 24px 70px\">\n    <div style=\"font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:1.6px;font-size:12px;color:#6b675e;margin-bottom:14px\">Community Standards<\u002Fdiv>\n    <h1 style=\"font-family:'Spectral',serif;font-weight:800;font-size:clamp(34px,4.6vw,52px);line-height:1.02;letter-spacing:-1.6px;margin:0 0 20px\">Built for civic signal, not gossip.<\u002Fh1>\n    <p style=\"font-size:18px;line-height:1.6;color:#3a362e;margin:0 0 36px\">We publish stories, patterns, concerns, and opportunities that help the community understand itself and respond. We do not publish doxxing, threats, personal attacks, unsupported accusations, private information, or content designed to shame individuals.<\u002Fp>\n    <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px\">\n      <div style=\"background:#fffaf1;border:1px solid #a3342959;border-radius:16px;padding:22px\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:#a33429;margin-bottom:12px\">Not allowed<\u002Fdiv>\n        <ul style=\"margin:0;padding-left:18px;font-size:14.5px;line-height:1.8;color:#3a362e\"><li>Doxxing or private addresses<\u002Fli><li>Phone numbers / private emails<\u002Fli><li>Unverified accusations against private individuals<\u002Fli><li>Medical or private personal information<\u002Fli><li>Threats, harassment, hate speech<\u002Fli><li>Naming minors in sensitive contexts<\u002Fli><li>Legal allegations without documentation<\u002Fli><li>Unverified rumors<\u002Fli><\u002Ful>\n      <\u002Fdiv>\n      <div style=\"background:#fffaf1;border:1px solid #19734a59;border-radius:16px;padding:22px\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:#19734a;margin-bottom:12px\">Allowed<\u002Fdiv>\n        <ul style=\"margin:0;padding-left:18px;font-size:14.5px;line-height:1.8;color:#3a362e\"><li>Firsthand observations<\u002Fli><li>Concerns about places, systems &amp; policies<\u002Fli><li>Documented facts<\u002Fli><li>Photos of public conditions<\u002Fli><li>Constructive complaints<\u002Fli><li>Community wins &amp; resident experiences<\u002Fli><li>Public meeting notes<\u002Fli><li>Patterns noticed by multiple residents<\u002Fli><\u002Ful>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"background:#fbf4e6;border:1px solid #d8cab2;border-radius:16px;padding:24px;margin-top:24px\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:#9a6a12;margin-bottom:12px\">Safer language pattern<\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:1fr 1fr;gap:18px\">\n        <div><div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#a33429;margin-bottom:6px\">Instead of<\u002Fdiv><p style=\"font-size:14.5px;line-height:1.5;color:#5a564d;margin:0;font-style:italic\">\"This camp is full of criminals.\"<\u002Fp><\u002Fdiv>\n        <div><div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#19734a;margin-bottom:6px\">We publish<\u002Fdiv><p style=\"font-size:14.5px;line-height:1.5;color:#2b2820;margin:0\">\"Residents near the area reported safety and sanitation concerns. The submission is under review and may be combined with other reports into a broader pattern report.\"<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ SIGNAL MAP ============ -->\n<sc-if value=\"{{ isMap }}\">\n<div style=\"\">\n  <section style=\"max-width:1240px;margin:0 auto;padding:46px 24px 8px\">\n    <div style=\"font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:1.6px;font-size:12px;color:#6b675e;margin-bottom:14px\">{{ cityShort }} · Signal Map<\u002Fdiv>\n    <h1 style=\"font-family:'Spectral',serif;font-weight:800;font-size:clamp(38px,5vw,60px);line-height:1;letter-spacing:-1.8px;margin:0 0 14px\">Where {{ cityName }}'s stories are coming from.<\u002Fh1>\n    <p style=\"font-size:18px;line-height:1.5;color:#5a564d;max-width:760px;margin:0 0 8px\">Every published signal mapped to where it was reported. Pins are color-coded by type, so you can see at a glance where wins, concerns, and opportunities are clustering across the city.<\u002Fp>\n  <\u002Fsection>\n  <section style=\"max-width:1240px;margin:0 auto;padding:16px 24px 64px\">\n    <div style=\"display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px\">\n      <sc-for list=\"{{ mapLegend }}\" as=\"leg\" hint-placeholder-count=\"6\">\n        <button onclick=\"{{ leg.onClick }}\" style=\"display:flex;align-items:center;gap:8px;border:1px solid {{ leg.rowBorder }};background:{{ leg.rowBg }};border-radius:999px;padding:8px 14px;cursor:pointer;font-family:'IBM Plex Mono',monospace;font-size:12px;font-weight:600;letter-spacing:0.4px;color:#3a362e\">\n          <span style=\"width:11px;height:11px;border-radius:999px;background:{{ leg.color }};display:inline-block;flex-shrink:0\"><\u002Fspan>{{ leg.label }} <span style=\"color:#8a857a\">{{ leg.count }}<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:1fr 340px;gap:18px;align-items:start\">\n      <div style=\"border:1px solid #d8cab2;border-radius:18px;overflow:hidden;box-shadow:0 10px 34px rgba(0,0,0,0.05)\">\n        <div id=\"gnbn-map\" style=\"width:100%;height:600px;background:#eee7d8\"><\u002Fdiv>\n      <\u002Fdiv>\n      <aside style=\"background:#fffaf1;border:1px solid #d8cab2;border-radius:18px;padding:18px;max-height:633px;overflow:auto\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#8a857a;margin-bottom:14px\">{{ mapCountLine }}<\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:9px\">\n          <sc-for list=\"{{ mapPosts }}\" as=\"p\" hint-placeholder-count=\"6\">\n            <button onclick=\"{{ p.open }}\" style=\"text-align:left;cursor:pointer;display:flex;gap:11px;align-items:flex-start;background:#fffdf8;border:1px solid #e4d8c2;border-radius:12px;padding:11px 12px\">\n              <span style=\"flex-shrink:0;width:11px;height:11px;border-radius:999px;background:{{ p.catColor }};margin-top:4px\"><\u002Fspan>\n              <span style=\"min-width:0;display:block\">\n                <span style=\"display:block;font-family:'Spectral',serif;font-weight:700;font-size:15px;line-height:1.2;color:#161616\">{{ p.title }}<\u002Fspan>\n                <span style=\"display:block;font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#8a857a;margin-top:3px\">{{ p.hood }} · {{ p.catLabel }}<\u002Fspan>\n              <\u002Fspan>\n            <\u002Fbutton>\n          <\u002Fsc-for>\n        <\u002Fdiv>\n      <\u002Faside>\n    <\u002Fdiv>\n  <\u002Fsection>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ PARTNERS ============ -->\n<sc-if value=\"{{ isPartners }}\">\n<div style=\"\">\n  <section style=\"max-width:1240px;margin:0 auto;padding:46px 24px 8px\">\n    <div style=\"font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:1.6px;font-size:12px;color:#6b675e;margin-bottom:14px\">For newsrooms &amp; local press<\u002Fdiv>\n    <h1 style=\"font-family:'Spectral',serif;font-weight:800;font-size:clamp(38px,5.2vw,64px);line-height:0.98;letter-spacing:-2px;margin:0 0 18px;max-width:900px\">Partner with the people who see it first.<\u002Fh1>\n    <p style=\"font-size:19px;line-height:1.5;color:#3a362e;max-width:760px;margin:0 0 8px\">Good News Bad News gives local newsrooms a steady, reviewed stream of resident signals - and gives citizen journalists the reach, mentorship, and editorial support to turn what they're seeing into real stories. Together you cover the city more completely than either can alone.<\u002Fp>\n  <\u002Fsection>\n\n  <section style=\"max-width:1240px;margin:0 auto;padding:36px 24px 8px\">\n    <div style=\"display:grid;grid-template-columns:repeat(3,1fr);gap:18px\">\n      <div style=\"background:#fffaf1;border:1px solid #19734a59;border-left:5px solid #19734a;border-radius:16px;padding:24px\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-weight:600;letter-spacing:1.4px;font-size:12px;color:#19734a;text-transform:uppercase;margin-bottom:10px\">For newsrooms<\u002Fdiv>\n        <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:23px;margin:0 0 8px;line-height:1.1\">A reviewed signal feed.<\u002Fh3>\n        <p style=\"font-size:14.5px;line-height:1.55;color:#5a564d;margin:0\">Browse emerging stories before they break. Every signal is moderated, location-tagged, and labeled by verification status - a running tip line built by residents across the city.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#fffaf1;border:1px solid #285d834d;border-left:5px solid #285d83;border-radius:16px;padding:24px\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-weight:600;letter-spacing:1.4px;font-size:12px;color:#285d83;text-transform:uppercase;margin-bottom:10px\">For citizen journalists<\u002Fdiv>\n        <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:23px;margin:0 0 8px;line-height:1.1\">Reach, mentorship &amp; a byline.<\u002Fh3>\n        <p style=\"font-size:14.5px;line-height:1.55;color:#5a564d;margin:0\">Residents who submit a signal can be paired with a partner reporter to expand it into a full story - with editorial guidance, fact-checking support, and credit for the person who saw it first.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#fffaf1;border:1px solid #c99a2e80;border-left:5px solid #c99a2e;border-radius:16px;padding:24px\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-weight:600;letter-spacing:1.4px;font-size:12px;color:#9a6a12;text-transform:uppercase;margin-bottom:10px\">For the community<\u002Fdiv>\n        <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:23px;margin:0 0 8px;line-height:1.1\">Patterns get real reporting.<\u002Fh3>\n        <p style=\"font-size:14.5px;line-height:1.55;color:#5a564d;margin:0\">The trends residents surface get the depth they deserve instead of disappearing into a feed - and the public gets reporting grounded in what people are actually living.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section style=\"max-width:1240px;margin:0 auto;padding:50px 24px 8px\">\n    <div style=\"font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:1.6px;font-size:12px;color:#6b675e;border-bottom:1px solid #d8cab2;padding-bottom:12px;margin-bottom:26px\">How a partnership works<\u002Fdiv>\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:18px\">\n      <div style=\"background:#fffaf1;border:1px solid #d8cab2;border-radius:18px;padding:22px\">\n        <div style=\"font-family:'Spectral',serif;font-weight:800;font-size:34px;color:#9a6a12;line-height:1;margin-bottom:12px\">1<\u002Fdiv>\n        <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:20px;margin:0 0 8px\">Claim a signal<\u002Fh3>\n        <p style=\"font-size:14px;line-height:1.5;color:#5a564d;margin:0\">Editors browse the reviewed feed and flag the signals worth expanding into reporting.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#fffaf1;border:1px solid #d8cab2;border-radius:18px;padding:22px\">\n        <div style=\"font-family:'Spectral',serif;font-weight:800;font-size:34px;color:#9a6a12;line-height:1;margin-bottom:12px\">2<\u002Fdiv>\n        <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:20px;margin:0 0 8px\">Co-report with the resident<\u002Fh3>\n        <p style=\"font-size:14px;line-height:1.5;color:#5a564d;margin:0\">The original contributor is invited to work with a reporter - sharing context, photos, and sources.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#fffaf1;border:1px solid #d8cab2;border-radius:18px;padding:22px\">\n        <div style=\"font-family:'Spectral',serif;font-weight:800;font-size:34px;color:#9a6a12;line-height:1;margin-bottom:12px\">3<\u002Fdiv>\n        <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:20px;margin:0 0 8px\">Publish &amp; credit<\u002Fh3>\n        <p style=\"font-size:14px;line-height:1.5;color:#5a564d;margin:0\">The expanded story runs in the partner outlet and links back, crediting the citizen journalist.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background:#fffaf1;border:1px solid #d8cab2;border-radius:18px;padding:22px\">\n        <div style=\"font-family:'Spectral',serif;font-weight:800;font-size:34px;color:#9a6a12;line-height:1;margin-bottom:12px\">4<\u002Fdiv>\n        <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:20px;margin:0 0 8px\">Track the pattern<\u002Fh3>\n        <p style=\"font-size:14px;line-height:1.5;color:#5a564d;margin:0\">Related signals are bundled so one story can document a citywide pattern, not a single incident.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section style=\"max-width:1240px;margin:0 auto;padding:50px 24px 8px\">\n    <div style=\"background:#161616;color:#fff;border-radius:24px;padding:42px;display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:start\">\n      <div>\n        <h2 style=\"font-family:'Spectral',serif;font-weight:800;font-size:32px;line-height:1.05;letter-spacing:-0.8px;margin:0 0 14px\">What partners get<\u002Fh2>\n        <ul style=\"margin:0;padding-left:18px;font-size:15px;line-height:1.9;color:#e7e1d4\">\n          <li>A moderated, location-tagged signal feed for your city<\u002Fli>\n          <li>Early access to pattern reports before they're public<\u002Fli>\n          <li>A pipeline of resident contributors and tips<\u002Fli>\n          <li>Co-branded \"In partnership with\" labeling on stories<\u002Fli>\n          <li>Shared editorial standards that protect contributors<\u002Fli>\n        <\u002Ful>\n      <\u002Fdiv>\n      <div style=\"background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.14);border-radius:16px;padding:24px\">\n        <sc-if value=\"{{ partnerSent }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"text-align:center;padding:14px 4px\">\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1.6px;text-transform:uppercase;color:#7fcfa5;margin-bottom:12px\">Inquiry received<\u002Fdiv>\n            <h3 style=\"font-family:'Spectral',serif;font-weight:700;font-size:24px;margin:0 0 10px\">Thanks - we'll be in touch.<\u002Fh3>\n            <p style=\"font-size:14.5px;line-height:1.55;color:#cfc8b9;margin:0\">A member of the partnerships team will reach out about bringing your newsroom into the {{ cityName }} pilot.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ partnerFormOpen }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#c99a2e;margin-bottom:16px\">Become a launch partner<\u002Fdiv>\n          <div style=\"display:flex;flex-direction:column;gap:12px\">\n            <input value=\"{{ partnerOrg }}\" oninput=\"{{ onPartnerOrg }}\" placeholder=\"Newsroom or organization\" style=\"border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.06);color:#fff;padding:12px;border-radius:11px;font-size:14.5px\">\n            <select value=\"{{ partnerCity }}\" onchange=\"{{ onPartnerCity }}\" style=\"border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.06);color:#fff;padding:12px;border-radius:11px;font-size:14.5px\">\n              <option style=\"color:#161616\">Spokane<\u002Foption>\n              <option style=\"color:#161616\">Honolulu<\u002Foption>\n              <option style=\"color:#161616\">Another city<\u002Foption>\n            <\u002Fselect>\n            <input value=\"{{ partnerEmail }}\" oninput=\"{{ onPartnerEmail }}\" placeholder=\"Work email\" style=\"border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.06);color:#fff;padding:12px;border-radius:11px;font-size:14.5px\">\n            <textarea value=\"{{ partnerNote }}\" oninput=\"{{ onPartnerNote }}\" placeholder=\"What kind of stories does your newsroom cover?\" style=\"border:1px solid rgba(255,255,255,0.2);background:rgba(255,255,255,0.06);color:#fff;padding:12px;border-radius:11px;font-size:14.5px;min-height:84px;resize:vertical;font-family:'Public Sans',sans-serif\"><\u002Ftextarea>\n            <button onclick=\"{{ sendPartner }}\" style=\"border:none;background:#19734a;color:#fff;border-radius:999px;padding:13px 22px;font-weight:700;font-size:15px;cursor:pointer\">Request a partnership call<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <section style=\"max-width:1240px;margin:0 auto;padding:34px 24px 64px\">\n    <div style=\"background:#fbf4e6;border:1px solid #d8cab2;border-radius:16px;padding:22px 24px\">\n      <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1.4px;text-transform:uppercase;color:#9a6a12;margin-bottom:10px\">In conversation with newsrooms in Spokane &amp; Honolulu<\u002Fdiv>\n      <p style=\"font-size:14.5px;line-height:1.55;color:#5a564d;margin:0\">We're onboarding founding press partners in both launch cities - daily papers, weeklies, public radio, and independent local reporters. If your newsroom covers a community we're in, there's a seat at the table.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<!-- ============ ADMIN ============ -->\n<sc-if value=\"{{ isAdmin }}\">\n<div style=\"\">\n  <section style=\"max-width:1340px;margin:0 auto;padding:44px 24px 70px\">\n    <div style=\"display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px;border-bottom:1px solid #d8cab2;padding-bottom:18px;margin-bottom:24px\">\n      <div>\n        <div style=\"font-family:'IBM Plex Mono',monospace;text-transform:uppercase;letter-spacing:1.6px;font-size:12px;color:#6b675e;margin-bottom:10px\">Moderation · Internal<\u002Fdiv>\n        <h1 style=\"font-family:'Spectral',serif;font-weight:800;font-size:clamp(30px,3.8vw,44px);line-height:1;letter-spacing:-1.4px;margin:0\">Submission review board<\u002Fh1>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:18px;font-family:'IBM Plex Mono',monospace;font-size:12px;color:#6b675e\">\n        <span>Queue <strong style=\"color:#161616;font-size:16px\">{{ statQueue }}<\u002Fstrong><\u002Fspan>\n        <span>Published <strong style=\"color:#161616;font-size:16px\">{{ statPublished }}<\u002Fstrong><\u002Fspan>\n        <span>Flagged <strong style=\"color:#a33429;font-size:16px\">{{ statFlagged }}<\u002Fstrong><\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"font-size:15px;line-height:1.5;color:#5a564d;max-width:760px;margin:0 0 26px\">Every submission moves through automated risk screening and human review before publishing. Move a card right to advance it; publish to push it live to the public feed.<\u002Fp>\n\n    <div style=\"display:grid;grid-template-columns:repeat(4,1fr);gap:14px;align-items:start\">\n      <div style=\"background:#fbf4e6;border:1px solid #d8cab2;border-radius:16px;padding:14px;min-height:200px\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:#6b675e;margin-bottom:12px;display:flex;justify-content:space-between\"><span>New<\u002Fspan><span>{{ colNewCount }}<\u002Fspan><\u002Fdiv>\n        <sc-for list=\"{{ colNew }}\" as=\"item\" hint-placeholder-count=\"2\">\n          <div style=\"background:#fffaf1;border:1px solid #d8cab2;border-radius:12px;padding:13px;margin-bottom:10px\">\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-weight:600;letter-spacing:0.8px;font-size:10px;text-transform:uppercase;padding:3px 7px;border-radius:999px;color:{{ item.catColor }};background:{{ item.catBg }};border:1px solid {{ item.catBorder }}\">{{ item.catLabel }}<\u002Fspan>\n            <h4 style=\"font-family:'Spectral',serif;font-weight:700;font-size:15px;line-height:1.2;margin:9px 0 6px\">{{ item.title }}<\u002Fh4>\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#8a857a;margin-bottom:8px\">{{ item.metaLine }}<\u002Fdiv>\n            <div style=\"font-size:12px;line-height:1.4;color:{{ item.scanColor }};background:{{ item.scanBg }};border-radius:8px;padding:8px;margin-bottom:10px\">{{ item.scanMessage }}<\u002Fdiv>\n            <div style=\"display:flex;gap:6px;flex-wrap:wrap\"><button onclick=\"{{ item.toReview }}\" style=\"border:1px solid #d8cab2;background:#fffdf8;color:#161616;border-radius:8px;padding:6px 9px;font-size:11px;font-weight:700;cursor:pointer\">Send to review →<\u002Fbutton><button onclick=\"{{ item.reject }}\" style=\"border:1px solid #a3342959;background:#a3342914;color:#a33429;border-radius:8px;padding:6px 9px;font-size:11px;font-weight:700;cursor:pointer\">Reject<\u002Fbutton><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"background:#fbf4e6;border:1px solid #d8cab2;border-radius:16px;padding:14px;min-height:200px\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:#6b675e;margin-bottom:12px;display:flex;justify-content:space-between\"><span>Human review<\u002Fspan><span>{{ colReviewCount }}<\u002Fspan><\u002Fdiv>\n        <sc-for list=\"{{ colReview }}\" as=\"item\" hint-placeholder-count=\"1\">\n          <div style=\"background:#fffaf1;border:1px solid #d8cab2;border-radius:12px;padding:13px;margin-bottom:10px\">\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-weight:600;letter-spacing:0.8px;font-size:10px;text-transform:uppercase;padding:3px 7px;border-radius:999px;color:{{ item.catColor }};background:{{ item.catBg }};border:1px solid {{ item.catBorder }}\">{{ item.catLabel }}<\u002Fspan>\n            <h4 style=\"font-family:'Spectral',serif;font-wei
