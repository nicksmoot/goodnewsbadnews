ght:700;font-size:15px;line-height:1.2;margin:9px 0 6px\">{{ item.title }}<\u002Fh4>\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#8a857a;margin-bottom:10px\">{{ item.metaLine }}<\u002Fdiv>\n            <div style=\"display:flex;gap:6px;flex-wrap:wrap\"><button onclick=\"{{ item.toVerified }}\" style=\"border:1px solid #19734a59;background:#19734a14;color:#19734a;border-radius:8px;padding:6px 9px;font-size:11px;font-weight:700;cursor:pointer\">Mark verified →<\u002Fbutton><button onclick=\"{{ item.toNew }}\" style=\"border:1px solid #d8cab2;background:#fffdf8;color:#6b675e;border-radius:8px;padding:6px 9px;font-size:11px;font-weight:700;cursor:pointer\">← Back<\u002Fbutton><button onclick=\"{{ item.reject }}\" style=\"border:1px solid #a3342959;background:#a3342914;color:#a33429;border-radius:8px;padding:6px 9px;font-size:11px;font-weight:700;cursor:pointer\">Reject<\u002Fbutton><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"background:#fbf4e6;border:1px solid #d8cab2;border-radius:16px;padding:14px;min-height:200px\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:#6b675e;margin-bottom:12px;display:flex;justify-content:space-between\"><span>Verified<\u002Fspan><span>{{ colVerifiedCount }}<\u002Fspan><\u002Fdiv>\n        <sc-for list=\"{{ colVerified }}\" as=\"item\" hint-placeholder-count=\"1\">\n          <div style=\"background:#fffaf1;border:1px solid #d8cab2;border-radius:12px;padding:13px;margin-bottom:10px\">\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-weight:600;letter-spacing:0.8px;font-size:10px;text-transform:uppercase;padding:3px 7px;border-radius:999px;color:{{ item.catColor }};background:{{ item.catBg }};border:1px solid {{ item.catBorder }}\">{{ item.catLabel }}<\u002Fspan>\n            <h4 style=\"font-family:'Spectral',serif;font-weight:700;font-size:15px;line-height:1.2;margin:9px 0 6px\">{{ item.title }}<\u002Fh4>\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#8a857a;margin-bottom:10px\">{{ item.metaLine }}<\u002Fdiv>\n            <div style=\"display:flex;gap:6px;flex-wrap:wrap\"><button onclick=\"{{ item.publish }}\" style=\"border:none;background:#19734a;color:#fff;border-radius:8px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer\">Publish to feed<\u002Fbutton><button onclick=\"{{ item.toReview }}\" style=\"border:1px solid #d8cab2;background:#fffdf8;color:#6b675e;border-radius:8px;padding:6px 9px;font-size:11px;font-weight:700;cursor:pointer\">← Back<\u002Fbutton><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n      <div style=\"background:#fbf4e6;border:1px solid #d8cab2;border-radius:16px;padding:14px;min-height:200px\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;letter-spacing:1.2px;text-transform:uppercase;color:#6b675e;margin-bottom:12px;display:flex;justify-content:space-between\"><span>Published<\u002Fspan><span>{{ colPublishedCount }}<\u002Fspan><\u002Fdiv>\n        <sc-for list=\"{{ colPublished }}\" as=\"item\" hint-placeholder-count=\"2\">\n          <div style=\"background:#fffaf1;border:1px solid #19734a40;border-radius:12px;padding:13px;margin-bottom:10px\">\n            <span style=\"font-family:'IBM Plex Mono',monospace;font-weight:600;letter-spacing:0.8px;font-size:10px;text-transform:uppercase;padding:3px 7px;border-radius:999px;color:{{ item.catColor }};background:{{ item.catBg }};border:1px solid {{ item.catBorder }}\">{{ item.catLabel }}<\u002Fspan>\n            <h4 style=\"font-family:'Spectral',serif;font-weight:700;font-size:15px;line-height:1.2;margin:9px 0 6px\">{{ item.title }}<\u002Fh4>\n            <div style=\"font-family:'IBM Plex Mono',monospace;font-size:10.5px;color:#19734a;margin-bottom:8px\">Live · {{ item.status }}<\u002Fdiv>\n            <a href=\"{{ item.viewHref }}\" style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;color:#285d83;font-weight:600;text-decoration:none\">View in feed →<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fsc-for>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"margin-top:22px\"><button onclick=\"{{ resetDemo }}\" style=\"border:1px solid #d8cab2;background:#fffdf8;color:#6b675e;border-radius:999px;padding:9px 16px;font-size:12.5px;font-weight:700;cursor:pointer\">Reset demo data<\u002Fbutton><\u002Fdiv>\n  <\u002Fsection>\n<\u002Fdiv>\n<\u002Fsc-if>\n\n<\u002Fmain>\n\n<footer style=\"border-top:1px solid #d8cab2;margin-top:auto\">\n  <div style=\"max-width:1240px;margin:0 auto;padding:34px 24px;display:flex;justify-content:space-between;gap:24px;flex-wrap:wrap\">\n    <div style=\"max-width:340px\">\n      <div style=\"font-family:'Spectral',serif;font-weight:800;font-size:20px;letter-spacing:-0.4px;margin-bottom:8px\"><span style=\"color:#19734a\">Good News<\u002Fspan> <span style=\"color:#a33429\">Bad News<\u002Fspan><\u002Fdiv>\n      <p style=\"font-size:13px;line-height:1.55;color:#6b675e;margin:0\">A civic signal platform helping cities see themselves clearly. Now live in Spokane and Honolulu. We review submissions before publication and report patterns, not rumors.<\u002Fp>\n    <\u002Fdiv>\n    <div style=\"display:flex;gap:48px;flex-wrap:wrap;font-size:13.5px\">\n      <div style=\"display:flex;flex-direction:column;gap:8px\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#9a857a;margin-bottom:2px\">Read<\u002Fspan><a href=\"#/latest\" style=\"text-decoration:none;color:#3a362e\">Latest<\u002Fa><a href=\"#/good\" style=\"text-decoration:none;color:#3a362e\">Good News<\u002Fa><a href=\"#/bad\" style=\"text-decoration:none;color:#3a362e\">Bad News<\u002Fa><a href=\"#/both\" style=\"text-decoration:none;color:#3a362e\">Both<\u002Fa><\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:8px\"><span style=\"font-family:'IBM Plex Mono',monospace;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:#9a857a;margin-bottom:2px\">Participate<\u002Fspan><a href=\"#/submit\" style=\"text-decoration:none;color:#3a362e\">Submit a Signal<\u002Fa><a href=\"#/digest\" style=\"text-decoration:none;color:#3a362e\">Weekly Digest<\u002Fa><a href=\"#/about\" style=\"text-decoration:none;color:#3a362e\">About<\u002Fa><a href=\"#/standards\" style=\"text-decoration:none;color:#3a362e\">Community Standards<\u002Fa><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div style=\"border-top:1px solid #e4d8c2\"><div style=\"max-width:1240px;margin:0 auto;padding:16px 24px;font-family:'IBM Plex Mono',monospace;font-size:11px;color:#9a857a;letter-spacing:0.3px\">Good News Bad News · A civic signal platform · Now live in Spokane &amp; Honolulu · We review submissions before publication. A submitted signal is not a verified fact.<\u002Fdiv><\u002Fdiv>\n<\u002Ffooter>\n\n<\u002Fdiv>\n\n<template id=\"__bundler_thumbnail\">\n<svg viewBox=\"0 0 100 100\" xmlns=\"http://www.w3.org/2000/svg\">\n  <rect width=\"100\" height=\"100\" fill=\"#f4ecdd\"><\u002Frect>\n  <circle cx=\"38\" cy=\"50\" r=\"13\" fill=\"#19734a\"><\u002Fcircle>\n  <circle cx=\"62\" cy=\"50\" r=\"13\" fill=\"#a33429\"><\u002Fcircle>\n<\u002Fsvg>\n<\u002Ftemplate><\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900},&quot;paidModel&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:false,&quot;tsType&quot;:&quot;boolean&quot;},&quot;showAdmin&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;requireSafetyCheck&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    route: (typeof location !== 'undefined' && location.hash) ? location.hash : '#/',\n    city: (typeof localStorage !== 'undefined' && localStorage.getItem('gnbn_city') === 'honolulu') ? 'honolulu' : 'spokane',\n    posts: null,\n    queue: null,\n    fCat: 'all', fTopic: 'All topics', fHood: 'All neighborhoods', fSearch: '', fSort: 'latest',\n    mapFilter: 'all',\n    step: 1,\n    form: this.blankForm(),\n    submitted: false, scanMessage: '', safetyWarn: false,\n    digestPref: 'All Signals', digestEmail: '', subscribed: false,\n    helpOpen: false, followed: {}, seenLocal: {},\n    partner: { org:'', city:'Spokane', email:'', note:'' }, partnerSent: false,\n  };\n\n  blankForm() {\n    const cfg = (this.CITIES && this.state) ? this.CITIES[this.state.city] : null;\n    const hood = cfg ? cfg.hoods[0] : 'Downtown';\n    return { title:'', type:'Good News', topic:'Schools', neighborhood:hood, cross:'', body:'',\n      tags:'', photo:'', photoName:'',\n      c0:false, c1:false, c2:false };\n  }\n\n  CAT = {\n    good:        { label:'Good News',    color:'#19734a', bg:'#19734a14', border:'#19734a59' },\n    bad:         { label:'Bad News',     color:'#a33429', bg:'#a3342914', border:'#a3342959' },\n    both:        { label:'Both',         color:'#8a5e0f', bg:'#c99a2e21', border:'#c99a2e80' },\n    opportunity: { label:'Opportunity',  color:'#285d83', bg:'#285d831a', border:'#285d834d' },\n    signal:      { label:'Signal',       color:'#5a564d', bg:'#5a564d12', border:'#5a564d40' },\n    pattern:     { label:'Pattern',      color:'#6b3fa0', bg:'#6b3fa014', border:'#6b3fa045' },\n  };\n  STATUS = {\n    'Submitted':'#8a857a', 'Under Review':'#9a6a12', 'Reviewed':'#285d83', 'Verified':'#19734a',\n    'Updated':'#285d83', 'Resolved':'#19734a', 'Background Signal':'#8a857a', 'Needs More Info':'#a33429',\n  };\n  TOPICS = ['Housing','Homelessness','Public safety','Schools','Youth','Health','Business','Jobs','Downtown','Transportation','Parks','Faith/community','Government','Recovery','Mental health','Events','Arts/culture','Environment'];\n  HOODS = ['Downtown','North Side','South Hill','Spokane Valley','West Central','East Central','Logan','Hillyard',\"Browne's Addition\"];\n\n  CITIES = {\n    spokane: { key:'spokane', name:'Spokane', region:'Washington', short:'Spokane, WA',\n      center:[47.6588,-117.4260], zoom:12, activeArea:'Downtown',\n      hoods:['Downtown','North Side','South Hill','Spokane Valley','West Central','East Central','Logan','Hillyard',\"Browne's Addition\"] },\n    honolulu: { key:'honolulu', name:'Honolulu', region:'Hawaiʻi', short:'Honolulu, HI',\n      center:[21.3045,-157.8480], zoom:12, activeArea:'Chinatown',\n      hoods:['Waikīkī','Kakaʻako','Chinatown','Kalihi','Mānoa','Kaimukī','Ala Moana','Kapālama','Salt Lake','Hawaiʻi Kai'] },\n  };\n  HOOD_COORDS = {\n    spokane: { 'Downtown':[47.6588,-117.4260],'North Side':[47.6920,-117.4090],'South Hill':[47.6290,-117.4040],'Spokane Valley':[47.6610,-117.2390],'West Central':[47.6720,-117.4430],'East Central':[47.6610,-117.3760],'Logan':[47.6700,-117.4030],'Hillyard':[47.7030,-117.3760],\"Browne's Addition\":[47.6540,-117.4400] },\n    honolulu: { 'Waikīkī':[21.2793,-157.8293],'Kakaʻako':[21.2950,-157.8540],'Chinatown':[21.3140,-157.8610],'Kalihi':[21.3340,-157.8730],'Mānoa':[21.3140,-157.8010],'Kaimukī':[21.2790,-157.8030],'Ala Moana':[21.2910,-157.8430],'Kapālama':[21.3260,-157.8770],'Salt Lake':[21.3520,-157.8870],'Hawaiʻi Kai':[21.2810,-157.7080] },\n  };\n  cityCfg() { return this.CITIES[this.state.city] || this.CITIES.spokane; }\n  cityHoods() { return this.cityCfg().hoods; }\n  coordFor(city, hood, id) {\n    const t = (this.HOOD_COORDS[city] && this.HOOD_COORDS[city][hood]) || (this.CITIES[city] || this.CITIES.spokane).center;\n    const hsh = String(id || '').split('').reduce((a,c) => a + c.charCodeAt(0), 0);\n    const dy = (((hsh * 37) % 100) / 100 - 0.5) * 0.011;\n    const dx = (((hsh * 61) % 100) / 100 - 0.5) * 0.015;\n    return { lat: t[0] + dy, lng: t[1] + dx };\n  }\n\n  typeToCat(t) {\n    const m = { 'Good News':'good','Bad News':'bad','Both':'both','Opportunity':'opportunity','Signal':'signal','Pattern / Trend':'pattern','Question':'signal' };\n    return m[t] || 'signal';\n  }\n\n  componentDidMount() {\n    window.addEventListener('hashchange', this._onHash = () => {\n      this.setState({ route: location.hash || '#/', helpOpen:false });\n      try { window.scrollTo(0, 0); } catch(e){}\n    });\n    let posts = null, queue = null, digest = null, sub = false;\n    try {\n      posts = JSON.parse(localStorage.getItem('gnbn_posts_v3') || 'null');\n      queue = JSON.parse(localStorage.getItem('gnbn_queue_v3') || 'null');\n      digest = localStorage.getItem('gnbn_digest_v1');\n      sub = localStorage.getItem('gnbn_sub_v1') === '1';\n    } catch(e){}\n    let seeded = false;\n    if (!posts) { posts = this.seedPosts(); seeded = true; }\n    if (!queue) { queue = this.seedQueue(); seeded = true; }\n    if (seeded) { try { localStorage.setItem('gnbn_posts_v3', JSON.stringify(posts)); localStorage.setItem('gnbn_queue_v3', JSON.stringify(queue)); } catch(e){} }\n    this.setState({ posts, queue, digestPref: digest || 'All Signals', subscribed: sub });\n  }\n  componentWillUnmount() {\n    if (this._onHash) window.removeEventListener('hashchange', this._onHash);\n    if (this._mapRetry) clearTimeout(this._mapRetry);\n    if (this._map) { try { this._map.remove(); } catch(e){} this._map = null; this._mapEl = null; this._markers = null; }\n  }\n\n  componentDidUpdate() {\n    if (this.page() === 'map') {\n      const key = [this.state.city, this.state.mapFilter, this.state.route, (this.state.posts || []).length].join('|');\n      if (!this._map || this._mapKey !== key) { this._mapKey = key; this.buildMap(); }\n    } else if (this._map) {\n      try { this._map.remove(); } catch(e){}\n      this._map = null; this._mapEl = null; this._markers = null; this._mapKey = null;\n    }\n  }\n\n  buildMap() {\n    if (this._mapRetry) { clearTimeout(this._mapRetry); this._mapRetry = null; }\n    if (typeof window === 'undefined' || !window.L) { this._mapRetry = setTimeout(() => this.buildMap(), 200); return; }\n    const el = document.getElementById('gnbn-map');\n    if (!el) { this._mapRetry = setTimeout(() => this.buildMap(), 150); return; }\n    const cfg = this.cityCfg();\n    // Always tear down any prior instance and recreate cleanly.\n    if (this._map) { try { this._map.remove(); } catch(e){} this._map = null; }\n    try { if (el._leaflet_id) el._leaflet_id = null; } catch(e){}\n    el.innerHTML = '';\n    const map = window.L.map(el, { scrollWheelZoom:false, attributionControl:true });\n    map.setView(cfg.center, cfg.zoom);\n    window.L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', { maxZoom:19, subdomains:'abcd', attribution:'© OpenStreetMap · © CARTO' }).addTo(map);\n    const mf = this.state.mapFilter || 'all';\n    const posts = (this.state.posts || []).filter(p => p.city === this.state.city && typeof p.lat === 'number' && (mf === 'all' || p.cat === mf));\n    posts.forEach(p => {\n      const c = this.CAT[p.cat] || this.CAT.signal;\n      const m = window.L.circleMarker([p.lat, p.lng], { radius:9, color:'#fffaf1', weight:2.5, fillColor:c.color, fillOpacity:0.95 });\n      m.addTo(map);\n      const safe = String(p.title || '').replace(/<\u002Fg,'&lt;');\n      m.bindPopup('<div style=\"font-family:\\'Public Sans\\',sans-serif;max-width:230px\"><div style=\"font-family:\\'IBM Plex Mono\\',monospace;font-size:10px;letter-spacing:0.6px;text-transform:uppercase;color:' + c.color + ';margin-bottom:4px\">' + c.label + ' · ' + p.hood + '<\u002Fdiv><div style=\"font-family:\\'Spectral\\',serif;font-weight:700;font-size:15px;line-height:1.2;margin-bottom:8px;color:#161616\">' + safe + '<\u002Fdiv><a href=\"#/post/' + p.id + '\" style=\"font-family:\\'IBM Plex Mono\\',monospace;font-size:11px;color:#19734a;font-weight:600;text-decoration:none\">Read the signal →<\u002Fa><\u002Fdiv>');\n    });\n    this._map = map;\n    setTimeout(() => { try { map.invalidateSize(); } catch(e){} }, 150);\n  }\n\n  persist(posts, queue) {\n    try {\n      localStorage.setItem('gnbn_posts_v3', JSON.stringify(posts ?? this.state.posts));\n      localStorage.setItem('gnbn_queue_v3', JSON.stringify(queue ?? this.state.queue));\n    } catch(e){}\n  }\n\n  seedPosts() {\n    const PHOTOS = {\n      'park-cleanup': 'https://picsum.photos/seed/gnbnpark/900/560',\n      'streetlights-monroe': 'https://picsum.photos/seed/gnbnstreet/900/560',\n      'shelter-mixed': 'https://picsum.photos/seed/gnbnshelter/900/560',\n      'robotics-mentors': 'https://picsum.photos/seed/gnbnrobotics/900/560',\n      'hiring-20': 'https://picsum.photos/seed/gnbnjobs/900/560',\n    };\n    const P = (id,cat,title,summary,topics,hood,status,by,helpful,age,body,next) => ({\n      id, cat, title, summary, topics, hood, status, by, helpful, age,\n      photo: PHOTOS[id] || '',\n      body: body || [summary], next: next || 'This signal is open for more reports. Residents can add detail, and organizations can respond.'\n    });\n    const spokane = [\n      P('breakfast-club','good','A teacher started a quiet breakfast club before school','A local teacher noticed students arriving early with nowhere to go and built a simple morning table that has become a place of stability.',['Schools','Youth'],'North Side','Verified','Verified teacher',31,2,\n        ['A teacher at a North Side elementary school noticed a small group of students arriving 30–40 minutes before the doors opened, often without having eaten.','Rather than send them back outside, she set up a quiet table in the cafeteria with cereal, fruit, and a few board games. Word spread, and a handful of parents now drop off extra supplies each week.','Three months in, staff say the students who use the table arrive calmer and are less likely to be sent to the office before lunch.'],\n        'Verified through the school and two staff members. We are tracking whether other Spokane schools have informal versions of this that could be supported.'),\n      P('sunday-gym','good','A coach opened a Sunday gym for kids with nowhere to train','A volunteer coach is using open gym time to help students build discipline, confidence, and community on weekends.',['Youth','Parks'],'North Side','Reviewed','Coach contributor',22,3,null,\n        'Reviewed for standards. The coach has asked for help with equipment and a second adult volunteer - see the Opportunities feed.'),\n      P('hiring-20','good','A local business hired 20 young people for the summer','A downtown employer built a structured summer program pairing first jobs with mentorship.',['Jobs','Youth','Business'],'Downtown','Verified','Business owner',18,5,null,null),\n      P('park-cleanup','good','A park cleanup brought out 80 residents','A neighborhood-organized cleanup drew far more volunteers than expected, and organizers want to make it monthly.',['Parks','Environment'],'South Hill','Verified','Neighborhood volunteer',27,6,null,null),\n      P('warming-center','good','A church opened a warming center on the coldest nights','A faith community quietly opened its hall as a warming center, coordinating with two nearby nonprofits.',['Faith/community','Homelessness'],'West Central','Reviewed','Faith leader',15,7,null,null),\n      P('library-teens','good','The branch library became an after-school anchor','Staff report a steady, well-behaved crowd of teens using the branch for homework and a warm place to be.',['Youth','Schools'],'East Central','Reviewed','Resident',9,8,null,null),\n      P('streetlights-monroe','bad','More broken streetlights reported near Monroe','Multiple residents have reported dark blocks near Monroe and Montgomery; the issue has been submitted for review and may be updated as more information comes in.',['Public safety','Transportation'],'North Side','Under Review','3 residents',14,1,\n        ['Several residents independently reported that a stretch of blocks near Monroe and Montgomery has had multiple streetlights out for weeks.','One contributor walks the route at night and described specific intersections where visibility is poor. We have not independently confirmed the cause or the city status.','We are logging additional reports to understand how widespread the outage is before raising it as a pattern.'],\n        'We are collecting more location detail. If you have seen this too, add the specific cross-streets so we can map the affected area.'),\n      P('motel-block','bad','Responders are seeing repeat calls from the same motel block','A contributor describes a pattern of repeated emergency calls around one corridor and asks whether the city is tracking it clearly. No private names are published.',['Public safety','Health'],'Downtown','Under Review','Anonymous, privately verified',19,2,null,\n        'Reframed as a system-level pattern. We do not publish private individuals. We are checking whether this overlaps with other downtown reports.'),\n      P('downtown-theft','bad','Downtown businesses report more theft but little attention','Several businesses describe a rising sense of disorder that has not yet shown up in a formal citywide conversation.',['Business','Public safety','Downtown'],'Downtown','Under Review','Owner contributor',12,3,null,null),\n      P('bus-stop-dark','bad','A bus stop has become unsafe after dark','Riders report a specific stop where lighting and visibility have made waiting feel unsafe at night.',['Transportation','Public safety'],'East Central','Reviewed','Transit rider',11,4,null,null),\n      P('restroom-closed','bad','A public restroom has been closed for months','Park users report a restroom that has been locked for an extended period with no posted timeline.',['Parks','Government'],'Spokane Valley','Submitted','Resident',6,5,null,null),\n      P('bullying-near-school','bad','Parents report recurring conflict near a school','Several parents describe a recurring after-school issue near a campus and are asking for adult presence at dismissal.',['Schools','Youth'],'Hillyard','Under Review','2 parents',8,6,null,\n        'Handled carefully - no minors are named. We are checking whether the school is aware and what supervision exists at dismissal.'),\n      P('program-overwhelmed','bad','A food program says it is overwhelmed','A nonprofit reports demand outpacing supply and is asking for coordinated help rather than one-off donations.',['Homelessness','Health'],'West Central','Reviewed','Nonprofit staff',13,7,null,null),\n      P('shelter-mixed','both','A new shelter opened downtown - more beds, but poor communication','Good news: more beds came online. Bad news: neighbors say communication about the opening was poor. Both are true.',['Homelessness','Downtown'],'Downtown','Verified','Multiple contributors',24,2,\n        ['A new shelter opened downtown this month, adding a meaningful number of beds during a stretch of cold weather.','At the same time, several neighboring residents and businesses said they learned about the opening only after it happened, and that there was no clear point of contact for questions or concerns.','Both things appear to be true at once: a real increase in capacity, and a real breakdown in communication. We are tracking how the operator and neighbors work it out.'],\n        'We have reached out for the operator’s side and will update this story. Neighbors can submit specific questions they want answered.'),\n      P('housing-infra','both','New housing is going up, but neighbors worry about infrastructure','Construction is adding units the city needs, while nearby residents raise real concerns about traffic and drainage.',['Housing','Transportation'],'Spokane Valley','Reviewed','Resident',16,4,null,null),\n      P('downtown-traffic','both','Downtown foot traffic is up, but security costs are rising','More people are coming downtown - a genuine win - while some small businesses say they are spending more on security.',   'We have reached out to the transit agency for clarification and will update. Riders can submit the specific stations where signage is unclear.'),\n      H('hnl-housing-kakaako','both','New Kakaʻako towers add homes, but locals fear being priced out','Construction is adding badly needed units while longtime residents worry the new housing is not built for them.',['Housing','Business'],'Kakaʻako','Reviewed','Resident',18,4,null,null),\n      H('hnl-tourism-return','both','Tourism is back in Waikīkī — revenue up, strain up too','Visitor spending has rebounded, helping workers and shops, while residents describe crowding and rising costs.',['Business','Downtown'],'Waikīkī','Reviewed','Owner contributor',16,5,null,null),\n      H('hnl-mentors-canoe','opportunity','A canoe club needs mentors for after-school paddling','Coaches want adults who can help run safe afternoon practices and teach ocean skills to keiki.',['Youth','Parks'],'Ala Moana','Reviewed','Volunteer opportunity',14,3,null,null),\n      H('hnl-food-hub','opportunity','A food-rescue hub needs drivers across the island','A nonprofit recovering unsold food needs volunteer drivers to get it to shelters and kūpuna before it spoils.',['Health','Homelessness'],'Kalihi','Reviewed','Nonprofit staff',12,4,null,null),\n      H('hnl-pattern-crosswalks','pattern','Pattern: pedestrian near-misses cluster on three Ala Moana crosswalks','Independent reports describe the same crosswalks as dangerous for kids and kūpuna. Combined into one de-identified pattern report.',['Public safety','Transportation'],'Ala Moana','Verified','Pattern report',21,3,\n        ['Over two weeks we received separate reports describing the same three crosswalks near Ala Moana as dangerous, especially for children and elders.','The reports describe short signal timing, turning vehicles, and poor visibility - without naming individuals.','We are publishing this as a pattern, a confirmed cluster of reports, rather than a single verified incident.'],\n        'We have shared the de-identified pattern with the relevant agency. Residents can keep adding detail to sharpen the map.'),\n    ];\n  }\n\n  seedQueue() {\n    const spokane = [\n      { id:'q1', wf:'New', cat:'bad', title:'Trash buildup recurring near Sprague and Napa', topic:'Public safety', hood:'East Central', by:'Resident', age:0,\n        body:['Residents report recurring trash buildup near Sprague and Napa over the last several weeks.'], status:'Submitted',\n        scan:{level:'clean', msg:'No risk flags. Describes a public condition, not a private individual. Ready for human review.'} },\n      { id:'q2', wf:'New', cat:'bad', title:'Concern about a downtown corridor', topic:'Public safety', hood:'Downtown', by:'Anonymous', age:0,\n        body:['A contributor raised a concern that named a specific individual and a private address.'], status:'Submitted',\n        scan:{level:'flag', msg:'Flagged: a private name and address were detected. Needs editing into system-level pattern language before it can advance.'} },\n      { id:'q3', wf:'Review', cat:'good', title:'Volunteers repainted a community center', topic:'Faith/community', hood:'West Central', by:'Volunteer', age:1,\n        body:['A group of volunteers spent a weekend repainting a tired community center used by youth programs.'], status:'Under Review',\n        scan:{level:'clean', msg:'No risk flags. Positive community signal.'} },\n      { id:'q4', wf:'Verified', cat:'opportunity', title:'Tutors needed for weekend reading program', topic:'Schools', hood:'Hillyard', by:'Nonprofit staff', age:1,\n        body:['A weekend reading program is looking for volunteer tutors who can commit to two hours on Saturdays.'], status:'Verified',\n        scan:{level:'clean', msg:'No risk flags. Verified with the host organization.'} },\n    ].map(q => ({ ...q, city:'spokane' }));\n    const honolulu = [\n      { id:'qh1', wf:'New', cat:'good', title:'Surfers organized a reef cleanup off Waikīkī', topic:'Environment', hood:'Waikīkī', by:'Resident', age:0,\n        body:['A group of surfers organized a volunteer reef cleanup and want help making it monthly.'], status:'Submitted',\n        scan:{level:'clean', msg:'No risk flags. Positive community signal. Ready for human review.'} },\n      { id:'qh2', wf:'Review', cat:'bad', title:'Flooding reported again on a Kalihi block', topic:'Public safety', hood:'Kalihi', by:'2 residents', age:1,\n        body:['Residents report repeat flooding on the same block after moderate rain.'], status:'Under Review',\n        scan:{level:'clean', msg:'No risk flags. Describes a public condition. In review.'} },\n    ].map(q => ({ ...q, city:'honolulu' }));\n    return [...spokane, ...honolulu];\n  }\n\n  // ---------- routing helpers ----------\n  page() {\n    const h = (this.state.route || '#/').replace(/^#/, '');\n    if (h.startsWith('/post/')) return 'post';\n    const map = { '/':'home','':'home','/latest':'feed','/good':'feed','/bad':'feed','/both':'feed',\n      '/map':'map','/partners':'partners',\n      '/submit':'submit','/digest':'digest','/about':'about','/standards':'standards','/admin':'admin' };\n    return map[h] || 'home';\n  }\n  feedCatFromRoute() {\n    const h = (this.state.route || '').replace(/^#/, '');\n    if (h === '/good') return 'good';\n    if (h === '/bad') return 'bad';\n    if (h === '/both') return 'both';\n    return null; // latest\n  }\n\n  decorate(p) {\n    const cat = this.CAT[p.cat] || this.CAT.signal;\n    const statusColor = this.STATUS[p.status] || '#8a857a';\n    return {\n      ...p,\n      catLabel: cat.label, catColor: cat.color, catBg: cat.bg, catBorder: cat.border,\n      status: p.status, statusColor, statusBorder: statusColor + '55',\n      metaLine: `${p.hood} · ${p.by} · ${p.age === 0 ? 'today' : p.age + 'd ago'}`,\n      helpfulLine: `${(this.state.seenLocal[p.id] ? p.helpful + 1 : p.helpful)} helpful`,\n      topics: p.topics,\n      hasPhoto: !!p.photo, photo: p.photo || '',\n      cardPhotoEl: p.photo ? React.createElement('img', { src: p.photo, alt:'', style:{ width:'calc(100% + 40px)', height:'150px', objectFit:'cover', margin:'-20px -20px 0', borderRadius:'16px 16px 0 0' } }) : null,\n      detailPhotoEl: p.photo ? React.createElement('img', { src: p.photo, alt:'', style:{ width:'100%', maxHeight:'400px', objectFit:'cover', borderRadius:'14px', marginBottom:'26px' } }) : null,\n      open: () => { location.hash = '#/post/' + p.id; },\n    };\n  }\n\n  filteredPosts() {\n    const { posts, fTopic, fHood, fSearch, fSort } = this.state;\n    if (!posts) return [];\n    const routeCat = this.feedCatFromRoute();\n    const cat = routeCat || this.state.fCat;\n    let list = posts.filter(p => p.city === this.state.city);\n    if (cat && cat !== 'all') list = list.filter(p => p.cat === cat);\n    if (fTopic && fTopic !== 'All topics') list = list.filter(p => (p.topics||[]).includes(fTopic));\n    if (fHood && fHood !== 'All neighborhoods') list = list.filter(p => p.hood === fHood);\n    if (fSearch && fSearch.trim()) {\n      const q = fSearch.toLowerCase();\n      list = list.filter(p => (p.title + ' ' + p.summary + ' ' + (p.topics||[]).join(' ')).toLowerCase().includes(q));\n    }\n    if (fSort === 'helpful') list.sort((a,b)=>b.helpful - a.helpful);\n    else list.sort((a,b)=>a.age - b.age);\n    return list;\n  }\n\n  // ---------- AI safety scan (heuristic) ----------\n  scan(text) {\n    const flags = [];\n    const t = (text || '');\n    if (/\\b\\d{3}[-.\\s]?\\d{3}[-.\\s]?\\d{4}\\b/.test(t)) flags.push('a phone number');\n    if (/\\b\\d{1,6}\\s+[A-Z][a-z]+\\s+(St|Street|Ave|Avenue|Rd|Road|Blvd|Dr|Drive|Ln|Lane|Ct|Way|Pl)\\b/i.test(t)) flags.push('a private street address');\n    if (/\\b(criminal|pedophile|thief|stole|stealing|junkie|addict|drunk|crazy)\\b/i.test(t)) flags.push('language that could be a personal accusation');\n    if (/\\b(my kid|my son|my daughter|the student|a kid named|named)\\s+[A-Z][a-z]+/i.test(t)) flags.push('what looks like a named individual or minor');\n    if (/@[\\w.-]+\\.\\w+/.test(t)) flags.push('an email address');\n    if (/\\b(cheat(ed|ing|er)?|affair|mistress|divorce|custody|ex-?(wife|husband|girlfriend|boyfriend)|home ?wrecker|sleeping with|hooking up)\\b/i.test(t)) flags.push('a private personal dispute (this is a platform for public civic stories, not private relationships)');\n    if (flags.length === 0) {\n      return { level:'clean', msg:'No risk flags detected. This reads as a public, civic story about the city - it has been queued.' };\n    }\n    return { level:'flag', msg:'Our automated scan flagged ' + flags.join(', ') + '. We focus on public civic life, not private individuals or personal disputes - this will be reviewed and may be edited or held before publishing.' };\n  }\n\n  // ---------- form handlers ----------\n  setF(k, v) { this.setState(s => ({ form: { ...s.form, [k]: v }, safetyWarn:false })); }\n  goStep(n) { this.setState({ step:n, safetyWarn:false }); try{window.scrollTo(0,0);}catch(e){} }\n  readPhoto(e) {\n    const file = e.target.files && e.target.files[0];\n    if (!file) return;\n    const reader = new FileReader();\n    reader.onload = () => this.setState(s => ({ form: { ...s.form, photo: reader.result, photoName: file.name } }));\n    reader.readAsDataURL(file);\n  }\n\n  doSubmit() {\n    const f = this.state.form;\n    const scan = this.scan(f.title + ' ' + f.body);\n    const cat = this.typeToCat(f.type);\n    const tags = (f.tags||'').split(',').map(s=>s.trim()).filter(Boolean).slice(0,5);\n    const item = {\n      id: 'q' + Date.now(), wf:'New', cat, title: f.title || '(untitled signal)',\n      topic: f.topic, hood: f.neighborhood, by: 'Resident', age:0, tags, photo: f.photo || '',\n      body: [f.body || ''], status:'Submitted', scan, city: this.state.city,\n    };\n    Object.assign(item, this.coordFor(this.state.city, f.neighborhood, item.id));\n    const queue = [item, ...(this.state.queue || [])];\n    this.persist(null, queue);\n    this.setState({ queue, submitted:true, scanMessage: scan.msg });\n    try { window.scrollTo(0,0); } catch(e){}\n  }\n\n  // ---------- admin actions ----------\n  setWf(id, wf) {\n    const queue = (this.state.queue||[]).map(q => q.id===id ? {...q, wf} : q);\n    this.persist(null, queue); this.setState({ queue });\n  }\n  publishItem(id) {\n    const q = (this.state.queue||[]).find(x=>x.id===id);\n    if (!q) return;\n    const post = {\n      id: 'p-' + id, cat: q.cat, title: q.title,\n      summary: (q.body && q.body[0]) ? q.body[0] : q.title,\n      topics: [q.topic, ...((q.tags)||[])].filter(Boolean), hood: q.hood, status:'Verified', by: q.by, helpful: 0, age: 0,\n      photo: q.photo || '',\n      body: q.body && q.body.length ? q.body : [q.title],\n      next: 'Published from a resident submission after review. Residents can add more detail.',\n      city: q.city || 'spokane', ...this.coordFor(q.city || 'spokane', q.hood, q.id),\n    };\n    const posts = [post, ...(this.state.posts||[])];\n    const queue = (this.state.queue||[]).map(x => x.id===id ? {...x, wf:'Published'} : x);\n    this.persist(posts, queue);\n    this.setState({ posts, queue });\n  }\n  rejectItem(id) {\n    const queue = (this.state.queue||[]).filter(x=>x.id!==id);\n    this.persist(null, queue); this.setState({ queue });\n  }\n  resetDemo() {\n    const posts = this.seedPosts(), queue = this.seedQueue();\n    this.persist(posts, queue);\n    this.setState({ posts, queue, seenLocal:{}, followed:{} });\n  }\n\n  markSeen(id) {\n    const seenLocal = { ...this.state.seenLocal, [id]: !this.state.seenLocal[id] };\n    this.setState({ seenLocal });\n  }\n  toggleFollow(id) {\n    const followed = { ...this.state.followed, [id]: !this.state.followed[id] };\n    this.setState({ followed });\n  }\n  setCity(c) {\n    if (c !== 'spokane' && c !== 'honolulu') return;\n    try { localStorage.setItem('gnbn_city', c); } catch(e){}\n    this.setState({ city:c, fCat:'all', fTopic:'All topics', fHood:'All neighborhoods', fSearch:'', fSort:'latest', mapFilter:'all', form: this.blankForm(), step:1, submitted:false, helpOpen:false });\n    try { window.scrollTo(0,0); } catch(e){}\n  }\n  setMapFilter(k) { this.setState({ mapFilter:k }); }\n  setPartner(k, v) { this.setState(s => ({ partner: { ...s.partner, [k]: v }, partnerSent:false })); }\n  sendPartner() { this.setState({ partnerSent:true }); try { window.scrollTo(0,0); } catch(e){} }\n\n  renderVals() {\n    const page = this.page();\n    const ink = '#161616', muted = '#6b675e';\n    const navColor = (active) => active ? '#161616' : muted;\n    const routeCat = this.feedCatFromRoute();\n\n    // nav active states\n    const nav = {\n      navLatest: navColor(page==='feed' && !routeCat),\n      navGood: navColor(routeCat==='good'), navBad: navColor(routeCat==='bad'),\n      navBoth: navColor(routeCat==='both'), navDigest: navColor(page==='digest'),\n      navAbout: navColor(page==='about'), navStandards: navColor(page==='standards'),\n      navMap: navColor(page==='map'), navPartners: navColor(page==='partners'),\n      navAdmin: navColor(page==='admin'),\n    };\n\n    const showAdmin = this.props.showAdmin ?? true;\n    const paid = this.props.paidModel ?? false;\n\n    // posts (filtered to the active city)\n    const cfg = this.cityCfg();\n    const cityName = cfg.name, cityShort = cfg.short, cityRegion = cfg.region;\n    const allPosts = this.state.posts || [];\n    const cityPosts = allPosts.filter(p => p.city === this.state.city);\n    const decoratedAll = cityPosts.map(p => this.decorate(p));\n    const homePosts = decoratedAll.slice().sort((a,b)=>a.age-b.age).slice(0,6);\n    const feedPosts = this.filteredPosts().map(p => this.decorate(p));\n\n    // feed headings\n    const feedMeta = {\n      good: { kicker:'Good News', title:'The wins worth celebrating.', desc:'Improvements, inspiring people, promising programs, and the local momentum that usually goes unseen.' },\n      bad:  { kicker:'Bad News', title:'The problems that need attention.', desc:'Risks, gaps, failures, and early warning signs - surfaced constructively, reported as patterns rather than rumors.' },\n      both: { kicker:'Both', title:'Where progress and problems coexist.', desc:'The complicated stories that don’t fit a single label. Most real civic stories live here.' },\n      latest: { kicker:'The ' + cityName + ' Feed', title:'What residents are seeing.', desc:'Every signal reviewed before publication and labeled with its verification status. A submitted signal is not a verified fact.' },\n    };\n    const fm = feedMeta[routeCat || 'latest'];\n\n    // category chips (latest only)\n    const chipDefs = [['all','All'],['good','Good'],['bad','Bad'],['both','Both'],['opportunity','Opportunity'],['signal','Signal'],['pattern','Pattern']];\n    const catChips = chipDefs.map(([key,label]) => {\n      const active = this.state.fCat === key;\n      const c = key==='all' ? {color:'#161616',bg:'#161616',border:'#161616'} : (this.CAT[key]||this.CAT.signal);\n      return { label, color: active ? '#fff' : (key==='all'?'#161616':c.color),\n        bg: active ? (key==='all'?'#161616':c.color) : '#fffdf8',\n        border: active ? (key==='all'?'#161616':c.color) : '#d8cab2',\n        onClick: () => this.setState({ fCat: key }) };\n    });\n\n    // submit form\n    const steps = [1,2,3].map(n => {\n      const active = this.state.step === n;\n      const labels = {1:'1. Story',2:'2. Safety',3:'3. Review'};\n      return { label: labels[n], bg: active?'#161616':'#fffdf8', color: active?'#fff':muted, border: active?'#161616':'#d8cab2' };\n    });\n    const f = this.state.form;\n    const reviewCat = this.CAT[this.typeToCat(f.type)] || this.CAT.signal;\n\n    // digest options\n    const digDefs = [\n      ['Good Signals Only','Wins, youth stories, generosity, progress.'],\n      ['Warning Signals Only','Public-safety concerns, broken systems, rising needs.'],\n      ['Opportunity Signals Only','Places to volunteer, mentor, fund, or help.'],\n      ['All Signals','A balanced weekly view of Spokane.'],\n    ];\n    const digestOptions = digDefs.map(([title,desc]) => {\n      const active = this.state.digestPref === title;\n      return { title, desc, bg: active?'#fff8eb':'#fffaf1', border: active?'#c99a2e':'#d8cab2',\n        shadow: active?'inset 0 0 0 1px #c99a2e':'none',\n        onClick: () => { try{localStorage.setItem('gnbn_digest_v1',title);}catch(e){} this.setState({ digestPref: title }); } };\n    });\n\n    // admin columns (active city)\n    const queue = (this.state.queue || []).filter(q => q.city === this.state.city);\n    const decQ = (q) => {\n      const cat = this.CAT[q.cat]||this.CAT.signal;\n      const flag = q.scan && q.scan.level==='flag';\n      return { ...q, catLabel:cat.label, catColor:cat.color, catBg:cat.bg, catBorder:cat.border,\n        metaLine:`${q.hood} · ${q.topic} · ${q.by}`,\n        scanMessage: q.scan ? q.scan.msg : '',\n        scanColor: flag ? '#a33429' : '#19734a',\n        scanBg: flag ? '#a3342910' : '#19734a10',\n        viewHref: '#/post/p-' + q.id,\n        toReview: () => this.setWf(q.id,'Review'), toNew: () => this.setWf(q.id,'New'),\n        toVerified: () => this.setWf(q.id,'Verified'), publish: () => this.publishItem(q.id),\n        reject: () => this.rejectItem(q.id) };\n    };\n    const colNew = queue.filter(q=>q.wf==='New').map(decQ);\n    const colReview = queue.filter(q=>q.wf==='Review').map(decQ);\n    const colVerified = queue.filter(q=>q.wf==='Verified').map(decQ);\n    const colPublished = queue.filter(q=>q.wf==='Published').map(decQ);\n\n    // post detail\n    const hash = (this.state.route||'').replace(/^#/, '');\n    let detail = null, backHref = '#/latest';\n    if (page === 'post') {\n      const id = hash.replace('/post/', '');\n      const raw = allPosts.find(p=>p.id===id);\n      if (raw) {\n        detail = this.decorate(raw);\n        detail.body = raw.body || [raw.summary];\n neighborhoods', ...this.HOODS],\n      fSearch: this.state.fSearch, fTopic: this.state.fTopic, fHood: this.state.fHood, fSort: this.state.fSort,\n      onSearch: (e)=>this.setState({fSearch:e.target.value}),\n      onTopic: (e)=>this.setState({fTopic:e.target.value}),\n      onHood: (e)=>this.setState({fHood:e.target.value}),\n      onSort: (e)=>this.setState({fSort:e.target.value}),\n      feedPosts, feedEmpty: feedPosts.length===0,\n      feedCountLine: feedPosts.length + (feedPosts.length===1?' signal':' signals'),\n\n      // detail\n      detail, backHref,\n      helpOpen: this.state.helpOpen,\n      onHelp: ()=>this.setState({helpOpen:!this.state.helpOpen}),\n      submitHelp: ()=>this.setState({helpOpen:false}),\n\n      // submit\n      submitFeeLine: paid ? 'Submitting a signal costs $0.50 to reduce spam.' : 'Submitting is free.',\n      submitted: this.state.submitted, formOpen: !this.state.submitted,\n      scanMessage: this.state.scanMessage,\n      steps, step1:this.state.step===1, step2:this.state.step===2, step3:this.state.step===3,\n      form: this.state.form, safetyWarn: this.state.safetyWarn,\n      hasPhoto: !!this.state.form.photo, noPhoto: !this.state.form.photo, photoName: this.state.form.photoName,\n      photoThumbEl: this.state.form.photo ? React.createElement('img', { src:this.state.form.photo, alt:'preview', style:{ width:'84px', height:'84px', objectFit:'cover', borderRadius:'9px', border:'1px solid #d8cab2' } }) : null,\n      photoReviewEl: this.state.form.photo ? React.createElement('img', { src:this.state.form.photo, alt:'preview', style:{ width:'100%', maxHeight:'240px', objectFit:'cover', borderRadius:'12px', border:'1px solid #d8cab2', marginBottom:'16px' } }) : null,\n      topicList: this.TOPICS, hoodList: this.HOODS,\n      onTitle:(e)=>this.setF('title',e.target.value), onBody:(e)=>this.setF('body',e.target.value),\n      onType:(e)=>this.setF('type',e.target.value), onTopic2:(e)=>this.setF('topic',e.target.value),\n      onHoodField:(e)=>this.setF('neighborhood',e.target.value), onCross:(e)=>this.setF('cross',e.target.value),\n      onTags:(e)=>this.setF('tags',e.target.value),\n      onPhoto:(e)=>this.readPhoto(e), removePhoto:()=>this.setState(s=>({form:{...s.form,photo:'',photoName:''}})),\n      onC0:(e)=>this.setF('c0',e.target.checked), onC1:(e)=>this.setF('c1',e.target.checked),\n      onC2:(e)=>this.setF('c2',e.target.checked),\n      next2:()=>this.goStep(2),\n      toReview:()=>{ const okSafety = (this.props.requireSafetyCheck ?? true) ? (f.c0&&f.c1&&f.c2) : true; if(!okSafety){ this.setState({safetyWarn:true}); return; } this.goStep(3); },\n      back1:()=>this.goStep(1), back2:()=>this.goStep(2),\n      reviewTitle: f.title || '(untitled signal)',\n      reviewMeta: `${reviewCat.label} · ${f.topic} · ${f.neighborhood}`,\n      reviewBody: f.body || 'No description entered.',\n      submitButtonLabel: paid ? 'Pay $0.50 & submit for review' : 'Submit for review',\n      submitButtonNote: paid ? 'In the live product this opens checkout, then the signal enters moderation.' : 'Your signal goes straight to the moderation queue - nothing publishes automatically.',\n      doSubmit:()=>this.doSubmit(), resetForm:()=>{ this.setState({ form:this.blankForm(), step:1, submitted:false }); },\n\n      // digest\n      digestOptions, digestPref: this.state.digestPref, digestEmail: this.state.digestEmail,\n      onDigestEmail:(e)=>this.setState({digestEmail:e.target.value}),\n      subscribe:()=>{ try{localStorage.setItem('gnbn_sub_v1','1');}catch(e){} this.setState({subscribed:true}); },\n      subscribed: this.state.subscribed,\n      subscribeLabel: this.state.subscribed ? 'Update subscription' : 'Subscribe',\n\n      // admin\n      colNew, colReview, colVerified, colPublished,\n      colNewCount: colNew.length, colReviewCount: colReview.length, colVerifiedCount: colVerified.length, colPublishedCount: colPublished.length,\n      resetDemo:()=>this.resetDemo(),\n    };\n  }\n}\n<\u002Fscr
